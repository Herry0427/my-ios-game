<!DOCTYPE html>
<html>
<head>
    <link rel="apple-touch-icon" href="icon.png">
    <meta charset="UTF-8">
    <!-- PWA 全屏关键标签 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>我的私人贪吃蛇</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        canvas {
            border: 2px solid #555;
            background: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 95vw;
            max-height: 70vh;
        }
        .score {
            color: white;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .controls {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="score">分数: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <div class="controls">滑动屏幕控制方向</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        // 适配屏幕大小
        const gridSize = 20;
        canvas.width = Math.floor((window.innerWidth * 0.9) / gridSize) * gridSize;
        canvas.height = Math.floor((window.innerHeight * 0.6) / gridSize) * gridSize;

        let score = 0;
        let snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
        let dx = gridSize;
        let dy = 0;
        let foodX, foodY;

        function createFood() {
            foodX = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            foodY = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#4CAF50" : "#81C784";
                ctx.fillRect(part.x, part.y, gridSize-2, gridSize-2);
            });
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 穿墙逻辑 (iPhone 屏幕小，穿墙比较好玩)
            if (head.x < 0) head.x = canvas.width - gridSize;
            if (head.x >= canvas.width) head.x = 0;
            if (head.y < 0) head.y = canvas.height - gridSize;
            if (head.y >= canvas.height) head.y = 0;

            snake.unshift(head);

            if (head.x === foodX && head.y === foodY) {
                score += 10;
                scoreElement.innerText = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function checkGameOver() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function drawFood() {
            ctx.fillStyle = "#FF5252";
            ctx.fillRect(foodX, foodY, gridSize-2, gridSize-2);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function main() {
            if (checkGameOver()) {
                alert("游戏结束！得分: " + score);
                location.reload();
                return;
            }

            setTimeout(function() {
                clearCanvas();
                drawFood();
                moveSnake();
                drawSnake();
                main();
            }, 100);
        }

        // 触摸控制逻辑 (适配 iPhone)
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, false);

        document.addEventListener('touchmove', e => {
            if (!touchStartX || !touchStartY) return;
            e.preventDefault(); // 防止滚动页面

            let touchEndX = e.touches[0].clientX;
            let touchEndY = e.touches[0].clientY;

            let diffX = touchStartX - touchEndX;
            let diffY = touchStartY - touchEndY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && dx === 0) { dx = -gridSize; dy = 0; } // 左
                else if (diffX < 0 && dx === 0) { dx = gridSize; dy = 0; } // 右
            } else {
                if (diffY > 0 && dy === 0) { dx = 0; dy = -gridSize; } // 上
                else if (diffY < 0 && dy === 0) { dx = 0; dy = gridSize; } // 下
            }
            touchStartX = 0; touchStartY = 0;
        }, {passive: false});

        createFood();
        main();
    </script>
</body>
</html>
