<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="贪吃蛇">
<meta name="mobile-web-app-capable" content="yes">
<title>贪吃蛇</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #2a2a3a;
    --green: #00ff88;
    --green-dim: #00aa55;
    --red: #ff4455;
    --yellow: #ffcc00;
    --text: #e0e0f0;
    --text-dim: #666680;
    --snake-head: #00ff88;
    --snake-body: #00cc66;
    --food: #ff4455;
    --grid: #1a1a28;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    overflow: hidden;
    position: fixed;
    top: 0; left: 0;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 9999;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; }
  .screen.active { display: flex; }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    gap: 24px;
    background: radial-gradient(ellipse at 50% 30%, #1a1a2e 0%, var(--bg) 70%);
  }
  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(18px, 5vw, 28px);
    color: var(--green);
    text-shadow: 0 0 20px rgba(0,255,136,0.6), 0 0 40px rgba(0,255,136,0.3);
    text-align: center;
    line-height: 1.6;
    animation: pulse-glow 2s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%,100% { text-shadow: 0 0 20px rgba(0,255,136,0.6), 0 0 40px rgba(0,255,136,0.3); }
    50%      { text-shadow: 0 0 30px rgba(0,255,136,0.9), 0 0 60px rgba(0,255,136,0.5), 0 0 80px rgba(0,255,136,0.2); }
  }
  .subtitle { font-size: 20px; color: var(--text-dim); letter-spacing: 4px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px;
    width: 100%; max-width: 340px;
    text-align: center;
  }
  .card-title { font-size: 18px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 14px; }

  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--green);
    font-family: 'VT323', monospace;
    font-size: 22px;
    padding: 10px 14px;
    outline: none;
    letter-spacing: 2px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input[type="text"]:focus { border-color: var(--green); }
  input[type="text"]::placeholder { color: var(--text-dim); }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 2.5vw, 13px);
    padding: 14px 28px;
    border: 2px solid var(--green);
    background: transparent;
    color: var(--green);
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    -webkit-appearance: none;
    width: 100%; max-width: 340px;
  }
  .btn:active { background: var(--green); color: var(--bg); transform: scale(0.97); }

  .cloud-info {
    font-size: 18px;
    color: var(--text-dim);
    text-align: center;
    min-height: 24px;
    letter-spacing: 1px;
  }
  .cloud-info span { color: var(--yellow); }

  /* ── GAME SCREEN ── */
  #game-screen {
    padding: 0;
    gap: 0;
    justify-content: flex-start;
    background: var(--bg);
  }

  .hud {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px 6px;
    font-size: 18px;
    letter-spacing: 2px;
    flex-shrink: 0;
    padding-top: max(10px, env(safe-area-inset-top));
  }
  .hud-item { display: flex; flex-direction: column; gap: 2px; }
  .hud-label { font-size: 13px; color: var(--text-dim); }
  .hud-value { color: var(--green); font-size: 22px; }
  .hud-value.best { color: var(--yellow); }
  .hud-nick { color: var(--text); font-size: 18px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    min-height: 0;
  }

  canvas {
    display: block;
    border: 1px solid var(--border);
    image-rendering: pixelated;
    background: var(--grid);
    box-shadow: 0 0 30px rgba(0,255,136,0.08), inset 0 0 30px rgba(0,0,0,0.3);
  }

  /* ── D-PAD ── */
  .dpad-area {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 10px max(10px, env(safe-area-inset-bottom));
    gap: 0;
  }
  .dpad {
    display: grid;
    grid-template-areas: ". up ." "left . right" ". down .";
    grid-template-columns: 64px 64px 64px;
    grid-template-rows: 56px 56px 56px;
    gap: 4px;
  }
  .dpad-btn {
    display: flex; align-items: center; justify-content: center;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 24px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .dpad-btn:active { background: var(--green); border-color: var(--green); }
  .dpad-btn svg { fill: var(--text-dim); transition: fill 0.1s; }
  .dpad-btn:active svg { fill: var(--bg); }
  [data-dir="up"]    { grid-area: up; }
  [data-dir="left"]  { grid-area: left; }
  [data-dir="right"] { grid-area: right; }
  [data-dir="down"]  { grid-area: down; }

  /* ── OVERLAY (pause / gameover / new record) ── */
  .overlay {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,10,15,0.88);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .overlay.visible { display: flex; }
  .overlay-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(16px, 4vw, 22px);
    text-align: center;
    line-height: 1.8;
  }
  .overlay-title.green { color: var(--green); text-shadow: 0 0 20px rgba(0,255,136,0.5); }
  .overlay-title.red   { color: var(--red);   text-shadow: 0 0 20px rgba(255,68,85,0.5); }
  .overlay-title.yellow{ color: var(--yellow);text-shadow: 0 0 20px rgba(255,204,0,0.5); }
  .overlay-score { font-size: 28px; color: var(--text); letter-spacing: 3px; }
  .overlay-record { font-size: 20px; color: var(--yellow); letter-spacing: 2px; }
  .overlay-btns { display: flex; flex-direction: column; gap: 12px; width: 260px; }
  .btn-small {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 12px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    -webkit-appearance: none;
  }
  .btn-small.primary { border-color: var(--green); color: var(--green); }
  .btn-small:active { opacity: 0.7; transform: scale(0.97); }

  .saving-msg { font-size: 16px; color: var(--text-dim); letter-spacing: 2px; min-height: 20px; }
</style>
</head>
<body>

<!-- ══════════════ SETUP SCREEN ══════════════ -->
<div id="setup-screen" class="screen active">
  <div class="logo">SNAKE<br>ONLINE</div>
  <div class="subtitle">// ARCADE //</div>

  <div class="card">
    <div class="card-title">PLAYER ID</div>
    <input type="text" id="nick-input" placeholder="输入昵称" maxlength="12" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>

  <div class="cloud-info" id="cloud-info">— 输入昵称后自动查询云端 —</div>

  <button class="btn" id="start-btn">▶ START GAME</button>
</div>

<!-- ══════════════ GAME SCREEN ══════════════ -->
<div id="game-screen" class="screen">
  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">PLAYER</div>
      <div class="hud-nick" id="hud-nick">—</div>
    </div>
    <div class="hud-item" style="text-align:center">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="hud-score">0</div>
    </div>
    <div class="hud-item" style="text-align:right">
      <div class="hud-label">BEST</div>
      <div class="hud-value best" id="hud-best">—</div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="game-canvas"></canvas>
  </div>

  <div class="dpad-area">
    <div class="dpad">
      <div class="dpad-btn" data-dir="up">
        <svg width="24" height="24" viewBox="0 0 24 24"><polygon points="12,4 20,18 4,18"/></svg>
      </div>
      <div class="dpad-btn" data-dir="left">
        <svg width="24" height="24" viewBox="0 0 24 24"><polygon points="4,12 18,4 18,20"/></svg>
      </div>
      <div class="dpad-btn" data-dir="right">
        <svg width="24" height="24" viewBox="0 0 24 24"><polygon points="20,12 6,4 6,20"/></svg>
      </div>
      <div class="dpad-btn" data-dir="down">
        <svg width="24" height="24" viewBox="0 0 24 24"><polygon points="12,20 4,6 20,6"/></svg>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ GAME OVER OVERLAY ══════════════ -->
<div class="overlay" id="gameover-overlay">
  <div class="overlay-title red" id="over-title">GAME OVER</div>
  <div class="overlay-score" id="over-score"></div>
  <div class="overlay-record" id="over-record"></div>
  <div class="saving-msg" id="saving-msg"></div>
  <div class="overlay-btns">
    <button class="btn-small primary" id="retry-btn">▶ PLAY AGAIN</button>
    <button class="btn-small" id="menu-btn">⌂ MAIN MENU</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  SUPABASE REST API  (no external library)
// ══════════════════════════════════════════
const SB_URL = 'https://qfplpzosjcvvyhcotodz.supabase.co';
const SB_KEY = 'sb_publishable_CxJNsIAs4JRcaPugv2fn1Q_TAKzFmQB';
const SB_HEADERS = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

async function sbGetProfile(id) {
  try {
    const r = await fetch(
      `${SB_URL}/rest/v1/profiles?id=eq.${encodeURIComponent(id)}&select=id,nickname,highScore`,
      { headers: SB_HEADERS }
    );
    if (!r.ok) return null;
    const data = await r.json();
    return data && data.length > 0 ? data[0] : null;
  } catch(e) { return null; }
}

async function sbUpsert(id, nickname, highScore) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/profiles`, {
      method: 'POST',
      headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify({ id, nickname, highScore })
    });
    if (!r.ok) return false;
    return true;
  } catch(e) { return false; }
}

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let playerId   = '';
let cloudBest  = 0;
let localBest  = 0;

// ── SETUP SCREEN ──
const setupScreen  = document.getElementById('setup-screen');
const gameScreen   = document.getElementById('game-screen');
const nickInput    = document.getElementById('nick-input');
const cloudInfoEl  = document.getElementById('cloud-info');
const startBtn     = document.getElementById('start-btn');

// Load saved ID
const savedId = localStorage.getItem('snakeId') || '';
if (savedId) {
  nickInput.value = savedId;
  queryCloud(savedId);
}

let queryTimer = null;
nickInput.addEventListener('input', () => {
  clearTimeout(queryTimer);
  const val = nickInput.value.trim();
  if (!val) { cloudInfoEl.innerHTML = '— 输入昵称后自动查询云端 —'; return; }
  cloudInfoEl.innerHTML = '查询中...';
  queryTimer = setTimeout(() => queryCloud(val), 600);
});

async function queryCloud(id) {
  cloudInfoEl.innerHTML = '🔄 查询云端中...';
  const profile = await sbGetProfile(id);
  if (profile) {
    cloudBest = profile.highScore || 0;
    cloudInfoEl.innerHTML = `☁ 云端最高分：<span>${cloudBest}</span>`;
  } else {
    cloudBest = 0;
    cloudInfoEl.innerHTML = '☁ 新玩家，暂无云端记录';
  }
}

startBtn.addEventListener('click', () => {
  const nick = nickInput.value.trim();
  if (!nick) { nickInput.focus(); return; }
  playerId = nick;
  localStorage.setItem('snakeId', nick);
  showGame();
});

function showGame() {
  setupScreen.classList.remove('active');
  gameScreen.classList.add('active');
  document.getElementById('hud-nick').textContent = playerId;
  document.getElementById('hud-best').textContent = cloudBest || '—';
  localBest = cloudBest;
  startNewGame();
}

// ══════════════════════════════════════════
//  SNAKE GAME ENGINE
// ══════════════════════════════════════════
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');

const CELL = 20;
let COLS, ROWS;
let snake, dir, nextDir, food, score, gameOver, animId, speed;

const COLORS = {
  head:   '#00ff88',
  body:   '#00cc66',
  tail:   '#009944',
  food:   '#ff4455',
  foodGlow: 'rgba(255,68,85,0.3)',
  eye:    '#0a0a0f',
  grid:   '#1a1a28',
  bg:     '#12121a',
};

function initCanvas() {
  const wrap = canvas.parentElement;
  const wW = wrap.clientWidth  - 12;
  const wH = wrap.clientHeight - 12;
  COLS = Math.floor(wW / CELL);
  ROWS = Math.floor(wH / CELL);
  if (COLS < 10) COLS = 10;
  if (ROWS < 10) ROWS = 10;
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;
}

function startNewGame() {
  initCanvas();
  score   = 0;
  speed   = 150;
  gameOver = false;
  const mx = Math.floor(COLS / 2);
  const my = Math.floor(ROWS / 2);
  snake   = [{ x: mx, y: my }, { x: mx-1, y: my }, { x: mx-2, y: my }];
  dir     = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  spawnFood();
  updateHUD();
  cancelAnimationFrame(animId);
  loop();
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

let lastTime = 0;
function loop(ts = 0) {
  if (gameOver) return;
  animId = requestAnimationFrame(loop);
  if (ts - lastTime < speed) return;
  lastTime = ts;
  update();
  draw();
}

function update() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    triggerGameOver(); return;
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    triggerGameOver(); return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    speed = Math.max(80, 150 - score * 3);
    spawnFood();
    updateHUD();
  } else {
    snake.pop();
  }
}

function draw() {
  // BG
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = COLORS.grid;
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      ctx.beginPath();
      ctx.arc(x * CELL + CELL/2, y * CELL + CELL/2, 1, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Food glow
  ctx.save();
  ctx.shadowColor = COLORS.food;
  ctx.shadowBlur = 12;
  ctx.fillStyle = COLORS.food;
  const fx = food.x * CELL + 3;
  const fy = food.y * CELL + 3;
  const fs = CELL - 6;
  ctx.beginPath();
  ctx.arc(fx + fs/2, fy + fs/2, fs/2, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Snake
  snake.forEach((seg, i) => {
    const x = seg.x * CELL + 1;
    const y = seg.y * CELL + 1;
    const s = CELL - 2;
    const r = i === 0 ? 6 : i === snake.length-1 ? 3 : 4;
    if (i === 0) {
      ctx.save();
      ctx.shadowColor = COLORS.head;
      ctx.shadowBlur = 10;
      ctx.fillStyle = COLORS.head;
    } else {
      const t = i / snake.length;
      ctx.fillStyle = `rgb(${Math.round(0 + t*0)}, ${Math.round(204 - t*80)}, ${Math.round(102 - t*40)})`;
    }
    roundRect(ctx, x, y, s, s, r);
    ctx.fill();
    if (i === 0) {
      ctx.restore();
      // Eyes
      ctx.fillStyle = COLORS.eye;
      const perp = { x: dir.y, y: -dir.x };
      ctx.beginPath();
      ctx.arc(x+s/2 + dir.x*2 + perp.x*3, y+s/2 + dir.y*2 + perp.y*3, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x+s/2 + dir.x*2 - perp.x*3, y+s/2 + dir.y*2 - perp.y*3, 2, 0, Math.PI*2);
      ctx.fill();
    }
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}


function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-best').textContent  = Math.max(localBest, cloudBest) || '—';
}

// ── GAME OVER ──
async function triggerGameOver() {
  gameOver = true;
  cancelAnimationFrame(animId);

  const bestSoFar = Math.max(localBest, cloudBest);
  const isRecord  = score > bestSoFar;

  document.getElementById('over-score').textContent = `SCORE: ${score}`;

  const overlay   = document.getElementById('gameover-overlay');
  const titleEl   = document.getElementById('over-title');
  const recordEl  = document.getElementById('over-record');
  const savingMsg = document.getElementById('saving-msg');

  if (isRecord) {
    titleEl.className   = 'overlay-title yellow';
    titleEl.textContent = '✦ NEW RECORD ✦';
    recordEl.textContent = `BEST: ${score}`;
    savingMsg.textContent = '☁ 同步至云端...';
    overlay.classList.add('visible');
    localBest = score;
    const ok = await sbUpsert(playerId, playerId, score);
    savingMsg.textContent = ok ? '✓ 已同步' : '✗ 同步失败（离线）';
    cloudBest = score;
    document.getElementById('hud-best').textContent = score;
  } else {
    titleEl.className   = 'overlay-title red';
    titleEl.textContent = 'GAME OVER';
    recordEl.textContent = bestSoFar > 0 ? `BEST: ${bestSoFar}` : '';
    savingMsg.textContent = '';
    overlay.classList.add('visible');
  }
}

document.getElementById('retry-btn').addEventListener('click', () => {
  document.getElementById('gameover-overlay').classList.remove('visible');
  startNewGame();
});

document.getElementById('menu-btn').addEventListener('click', () => {
  document.getElementById('gameover-overlay').classList.remove('visible');
  gameScreen.classList.remove('active');
  setupScreen.classList.add('active');
  queryCloud(playerId);
});

// ── D-PAD ──
document.querySelectorAll('.dpad-btn').forEach(btn => {
  const handler = (e) => {
    e.preventDefault();
    const d = btn.dataset.dir;
    if (d === 'up'    && dir.y === 0) nextDir = { x: 0, y: -1 };
    if (d === 'down'  && dir.y === 0) nextDir = { x: 0, y:  1 };
    if (d === 'left'  && dir.x === 0) nextDir = { x:-1, y:  0 };
    if (d === 'right' && dir.x === 0) nextDir = { x: 1, y:  0 };
  };
  btn.addEventListener('touchstart', handler, { passive: false });
  btn.addEventListener('mousedown',  handler);
});

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp'    && dir.y === 0) nextDir = { x: 0, y: -1 };
  if (e.key === 'ArrowDown'  && dir.y === 0) nextDir = { x: 0, y:  1 };
  if (e.key === 'ArrowLeft'  && dir.x === 0) nextDir = { x:-1, y:  0 };
  if (e.key === 'ArrowRight' && dir.x === 0) nextDir = { x: 1, y:  0 };
});

// ── SWIPE ──
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 20 && dir.x === 0) nextDir = { x: 1, y: 0 };
    if (dx <-20 && dir.x === 0) nextDir = { x:-1, y: 0 };
  } else {
    if (dy > 20 && dir.y === 0) nextDir = { x: 0, y: 1 };
    if (dy <-20 && dir.y === 0) nextDir = { x: 0, y:-1 };
  }
}, { passive: true });

// ── RESIZE ──
window.addEventListener('resize', () => {
  if (gameScreen.classList.contains('active') && !gameOver) {
    initCanvas();
  }
});
</script>
