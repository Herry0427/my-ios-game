<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ARCADE HUB V5.0</title>
    <!-- 引用本地库 -->
    <script src="supabase.js"></script>
    <style>
        :root {
            --primary: #00ff88; --bg: #07070e; --panel: #0f0f1a; --border: #252535;
            --text: #dde0f5; --dim: #55556a; --gold: #ffcc00; --red: #ff4455;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* 页面切换容器 */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; overflow: hidden; }
        .screen.active { display: flex; }
        
        /* 顶部导航 */
        .header { padding: max(15px, env(safe-area-inset-top)) 20px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--panel); flex-shrink: 0; z-index: 100; }
        .btn-back { background: #1e1e2e; border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; }

        /* --- 主界面布局 --- */
        #home-screen { padding: 20px; align-items: center; justify-content: center; gap: 20px; }
        .snake-hero {
            width: 100%; max-width: 350px; aspect-ratio: 16/9; background: linear-gradient(135deg, #004d40 0%, #00ff88 100%);
            border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,255,136,0.3); cursor: pointer; border: 2px solid rgba(255,255,255,0.2);
        }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 350px; }
        .menu-item { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }

        /* --- 贪吃蛇游戏区 --- */
        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; position: relative; }
        canvas#snakeCanvas { border: 2px solid var(--border); background: #0a0a12; max-width: 95%; max-height: 80%; }
        .dpad { display: grid; grid-template-areas: ". up ." "left down right"; gap: 10px; padding: 20px; }
        .ctrl-btn { width: 70px; height: 70px; background: #222; border: 1px solid var(--border); border-radius: 15px; color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px #000; }
        .ctrl-btn:active { transform: translateY(2px); box-shadow: 0 1px #000; background: var(--primary); color: #000; }

        /* --- 农场区 --- */
        #farm-container { flex: 1; position: relative; background: #0a1510; overflow: hidden; cursor: crosshair; }
        .grass { position: absolute; inset: 0; background: radial-gradient(circle, #1a2e25 10%, transparent 10%); background-size: 40px 40px; opacity: 0.3; }
        .pet-sprite { position: absolute; cursor: pointer; display: flex; flex-direction: column; align-items: center; z-index: 50; }
        .pet-visual { position: relative; transition: transform 0.2s; }

        /* --- 列表与卡片 --- */
        .scroll-box { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .student-card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        
        /* --- 弹窗与加载 --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--panel); width: 88%; max-width: 350px; border-radius: 30px; padding: 30px; border: 1px solid var(--border); text-align: center; }
        .xp-bar { width: 100%; height: 10px; background: #000; border-radius: 5px; margin: 15px 0; border: 1px solid #333; overflow: hidden; }
        .xp-fill { height: 100%; background: var(--primary); transition: width 0.4s; box-shadow: 0 0 8px var(--primary); }
        
        #loading-overlay { position: fixed; inset: 0; background: rgba(7,7,14,0.8); z-index: 5000; display: none; align-items: center; justify-content: center; font-weight: bold; color: var(--primary); backdrop-filter: blur(3px); }
        .king-glow { filter: drop-shadow(0 0 12px var(--gold)); }
    </style>
</head>
<body>

    <div id="loading-overlay">📡 同步云端数据...</div>

    <!-- 1. 主厅 -->
    <div id="home-screen" class="screen active">
        <div class="header" style="width: 100%; background: none; border: none;">
            <div style="font-weight: bold; color: var(--primary); letter-spacing: 2px;">ARCADE HUB</div>
            <div id="conn-dot" style="width:10px; height:10px; border-radius:50%; background:red;"></div>
        </div>
        
        <div class="snake-hero" onclick="showScreen('game-screen')">
            <div style="font-size: 50px;">🐍</div>
            <div style="font-weight: bold; font-size: 24px; letter-spacing: 4px;">贪吃蛇大作战</div>
            <div style="font-size: 12px; opacity: 0.8;">CLASSIC ARCADE</div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="showScreen('farm-screen')">
                <div style="font-size: 35px;">🐾</div>
                <div style="font-size: 14px; font-weight: bold;">我的农场</div>
            </div>
            <div class="menu-item" onclick="showScreen('adopt-screen')">
                <div style="font-size: 35px;">🥚</div>
                <div style="font-size: 14px; font-weight: bold;">领养新宠</div>
            </div>
            <div class="menu-item" onclick="showScreen('manage-screen')" style="grid-column: span 2; flex-direction: row; justify-content: center; padding: 15px;">
                <div style="font-size: 24px;">📋</div>
                <div style="font-size: 16px; font-weight: bold;">学生档案管理中心</div>
            </div>
        </div>
        <p style="color:var(--dim); font-size: 10px;">Teacher Admin System V5.0</p>
    </div>

    <!-- 2. 贪吃蛇屏幕 -->
    <div id="game-screen" class="screen">
        <div class="header">
            <button class="btn-back" onclick="stopSnakeGame(); showScreen('home-screen');">◀ 返回大厅</button>
            <div id="snake-score">分数: 0</div>
            <div id="snake-best" style="color:var(--gold); font-size: 12px;">最高: 0</div>
        </div>
        <div class="game-area">
            <canvas id="snakeCanvas"></canvas>
            <div class="dpad">
                <button class="ctrl-btn" style="grid-area: up" onclick="setSnakeDir('UP')">▲</button>
                <button class="ctrl-btn" style="grid-area: left" onclick="setSnakeDir('LEFT')">◀</button>
                <button class="ctrl-btn" style="grid-area: down" onclick="setSnakeDir('DOWN')">▼</button>
                <button class="ctrl-btn" style="grid-area: right" onclick="setSnakeDir('RIGHT')">▶</button>
            </div>
        </div>
    </div>

    <!-- 3. 农场屏幕 -->
    <div id="farm-screen" class="screen">
        <div class="header">
            <button class="btn-back" onclick="showScreen('home-screen')">◀ 返回大厅</button>
            <div id="farm-title">我的农场</div>
            <button class="btn-back" onclick="loadFarmData()">↻ 刷新</button>
        </div>
        <div id="farm-container"><div class="grass"></div></div>
    </div>

    <!-- 4. 领养屏幕 -->
    <div id="adopt-screen" class="screen">
        <div class="header">
            <button class="btn-back" onclick="showScreen('home-screen')">◀ 返回大厅</button>
            <div style="font-weight: bold;">领养中心</div>
            <div></div>
        </div>
        <div class="scroll-box">
            <div style="background: var(--panel); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border);">
                <input type="text" id="name-input" placeholder="输入学生姓名..." style="width:100%; background:none; border:none; border-bottom:2px solid var(--primary); color:white; font-size:24px; padding: 10px 0;">
            </div>
            <div id="species-gallery" style="display:grid; grid-template-columns: repeat(4,1fr); gap:10px;"></div>
            <button class="snack-btn" style="width:100%; margin-top:25px; height:60px; background:var(--gold); color:black; font-weight:bold; border:none;" onclick="adoptAction()">🎲 随机领养神秘蛋</button>
        </div>
    </div>

    <!-- 5. 学生手册 -->
    <div id="manage-screen" class="screen">
        <div class="header">
            <button class="btn-back" onclick="showScreen('home-screen')">◀ 返回大厅</button>
            <div style="font-weight: bold;">名册管理</div>
            <div style="width:40px;"></div>
        </div>
        <div class="scroll-box" id="student-list-container"></div>
    </div>

    <!-- 6. 宠物互动弹窗 -->
    <div id="pet-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="m-visual"></div>
            <h2 id="m-name" style="margin: 10px 0 5px;">姓名</h2>
            <div id="m-species" style="color:var(--primary); font-size:14px; margin-bottom:10px;">物种</div>
            <div class="xp-bar"><div id="m-xp-fill" class="xp-fill"></div></div>
            <div id="m-stats" style="font-size:12px; color:var(--dim);">Lv.1 · 0/100</div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="snack-btn" onclick="feedPet(20)">🍬 零食 +20</button>
                <button class="snack-btn" style="border-color:var(--gold); color:var(--gold);" onclick="feedPet(100)">🏆 奖杯 +100</button>
            </div>
        </div>
    </div>

    <script>
        // ======= 1. 初始化 & 云端配置 =======
        const SB_URL = 'https://qfplpzosjcvvyhcotodz.supabase.co';
        const SB_KEY = 'sb_publishable_CxJNsIAs4JRcaPugv2fn1Q_TAKzFmQB';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const SPECIES_LIST = [
            { id:'trex', name:'霸王龙', color:'#4CAF50', body:'M20,60 Q5,65 2,50 Q10,55 25,55 L25,75 Q50,85 80,75 Q90,50 85,30 Q70,20 40,30 L25,55' },
            { id:'duck', name:'呆呆鸭', color:'#FFEB3B', body:'M30,70 Q10,70 10,50 Q10,20 40,20 Q70,20 70,50 Q70,70 50,70 Z' },
            { id:'shark', name:'机械鲨', color:'#2196F3', body:'M10,50 Q10,20 50,20 L80,45 L50,70 Q10,70 10,50' },
            { id:'panda', name:'功夫熊猫', color:'#FFFFFF', body:'M20,50 Q20,20 50,20 Q80,20 80,50 Q80,80 50,80 Q20,80 20,50' },
            { id:'cat', name:'赛博猫', color:'#F48FB1', body:'M25,70 Q15,70 15,40 Q15,15 40,15 Q65,15 65,40 Q65,70 55,70 Z' }
        ];

        let students = [];
        let sprites = [];
        let currentStudent = null;

        function toggleLoading(show) { document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none'; }

        // ======= 2. 核心 SVG 渲染引擎 =======
        function getPetSVG(spId, level, size = 60) {
            const sp = SPECIES_LIST.find(s => s.id === spId) || SPECIES_LIST[0];
            const stage = level === 0 ? 0 : (level < 5 ? 1 : (level < 10 ? 2 : (level < 15 ? 3 : 4)));
            if (stage === 0) return `<svg width="${size}" height="${size}" viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="25" ry="32" fill="#333" stroke="#555" stroke-width="2"/><path d="M40 40 L50 30 L60 45" fill="none" stroke="#666" stroke-width="2"/></svg>`;
            
            const scale = 0.45 + (stage * 0.12);
            return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" class="${stage === 4 ? 'king-glow' : ''}">
                <defs><radialGradient id="g-${sp.id}"><stop offset="0%" stop-color="${sp.color}"/><stop offset="100%" stop-color="#000"/></radialGradient></defs>
                <g transform="translate(50,50) scale(${scale}) translate(-50,-50)">
                    <path d="${sp.body}" fill="url(#g-${sp.id})" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
                    <circle cx="65" cy="40" r="10" fill="white" /><circle cx="68" cy="40" r="5" fill="black" />
                    ${stage >= 3 ? '<path d="M40,15 L50,2 L60,15" fill="none" stroke="gold" stroke-width="4" />' : ''}
                </g></svg>`;
        }

        // ======= 3. 页面导航逻辑 (修复转圈核心) =======
        async function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            try {
                if (id === 'farm-screen') await loadFarmData();
                if (id === 'manage-screen') await loadManageData();
                if (id === 'adopt-screen') renderAdoptGallery();
                if (id === 'game-screen') startSnakeGame();
            } catch (e) {
                console.error("加载失败", e);
            } finally {
                toggleLoading(false); // 确保遮罩消失
            }
        }

        // ======= 4. 农场引擎 (修复卡死) =======
        async function loadFarmData() {
            toggleLoading(true);
            const { data, error } = await sb.from('students').select('*');
            if (error) { alert("云端连接失败，请检查网络"); toggleLoading(false); return; }
            students = data;
            document.getElementById('farm-title').innerText = `农场学生 (${students.length})`;
            const map = document.getElementById('farm-container');
            map.querySelectorAll('.pet-sprite').forEach(el => el.remove());
            sprites = [];
            students.forEach(st => {
                const el = document.createElement('div');
                el.className = 'pet-sprite';
                el.innerHTML = `<div class="pet-visual">${getPetSVG(st.species, st.level)}</div><div class="pet-name">${st.name}</div><div class="pet-lvl">Lv.${st.level}</div>`;
                const x = 50 + Math.random() * (window.innerWidth - 100);
                const y = 100 + Math.random() * (window.innerHeight - 300);
                el.style.transform = `translate(${x}px, ${y}px)`;
                el.onclick = () => openPetModal(st);
                map.appendChild(el);
                sprites.push({ id: st.id, el, x, y, vx: (Math.random()-0.5)*0.6, vy: (Math.random()-0.5)*0.6 });
            });
            toggleLoading(false);
        }

        // 农场随机游走 AI
        setInterval(() => {
            if (!document.getElementById('farm-screen').classList.contains('active')) return;
            sprites.forEach(s => {
                s.x += s.vx * 2; s.y += s.vy * 2;
                if (s.x < 10 || s.x > window.innerWidth - 70) s.vx *= -1;
                if (s.y < 80 || s.y > window.innerHeight - 200) s.vy *= -1;
                s.el.style.transform = `translate(${s.x}px, ${s.y}px)`;
            });
        }, 50);

        // ======= 5. 贪吃蛇引擎 (完整植入) =======
        let snake = [], sDir = 'RIGHT', sFood = {x:0,y:0}, sScore = 0, sInterval = null;
        const sCanvas = document.getElementById('snakeCanvas');
        const sCtx = sCanvas.getContext('2d');
        const sSize = 20;

        function startSnakeGame() {
            sCanvas.width = Math.floor(window.innerWidth * 0.9 / sSize) * sSize;
            sCanvas.height = Math.floor(window.innerHeight * 0.4 / sSize) * sSize;
            snake = [{x:80, y:80}, {x:60, y:80}, {x:40, y:80}];
            sDir = 'RIGHT'; sScore = 0; spawnSnakeFood();
            document.getElementById('snake-score').innerText = "分数: 0";
            document.getElementById('snake-best').innerText = "最高: " + (localStorage.getItem('snakeBest') || 0);
            if(sInterval) clearInterval(sInterval);
            sInterval = setInterval(snakeTick, 150);
        }

        function snakeTick() {
            let head = {...snake[0]};
            if(sDir === 'UP') head.y -= sSize; if(sDir === 'DOWN') head.y += sSize;
            if(sDir === 'LEFT') head.x -= sSize; if(sDir === 'RIGHT') head.x += sSize;
            if(head.x < 0 || head.x >= sCanvas.width || head.y < 0 || head.y >= sCanvas.height || snake.some(s => s.x === head.x && s.y === head.y)) {
                stopSnakeGame(); alert("游戏结束！得分：" + sScore); return;
            }
            snake.unshift(head);
            if(head.x === sFood.x && head.y === sFood.y) {
                sScore += 10; document.getElementById('snake-score').innerText = "分数: " + sScore;
                spawnSnakeFood();
            } else { snake.pop(); }
            drawSnake();
        }

        function drawSnake() {
            sCtx.fillStyle = '#000'; sCtx.fillRect(0,0,sCanvas.width,sCanvas.height);
            sCtx.fillStyle = varColor('--primary');
            snake.forEach((p, i) => { sCtx.fillRect(p.x, p.y, sSize-2, sSize-2); });
            sCtx.fillStyle = 'red'; sCtx.fillRect(sFood.x, sFood.y, sSize-2, sSize-2);
        }

        function spawnSnakeFood() {
            sFood = { 
                x: Math.floor(Math.random() * (sCanvas.width/sSize)) * sSize,
                y: Math.floor(Math.random() * (sCanvas.height/sSize)) * sSize
            };
        }

        function setSnakeDir(d) { sDir = d; }
        function stopSnakeGame() { clearInterval(sInterval); }
        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        // ======= 6. 学生管理 & 领养逻辑 =======
        async function loadManageData() {
            toggleLoading(true);
            const { data } = await sb.from('students').select('*').order('level', {ascending:false});
            const list = document.getElementById('student-list-container');
            list.innerHTML = data.map(st => `
                <div class="student-card">
                    <div style="width:50px">${getPetSVG(st.species, st.level, 45)}</div>
                    <div style="flex:1">
                        <div style="font-weight:bold">${st.name}</div>
                        <div style="font-size:12px; color:var(--dim)">Lv.${st.level} · 经验 ${st.xp%100}/100</div>
                    </div>
                    <button class="btn-back" onclick="openPetModalById('${st.id}')">互动</button>
                </div>
            `).join('');
            toggleLoading(false);
        }

        function openPetModal(st) {
            currentStudent = st;
            document.getElementById('m-visual').innerHTML = getPetSVG(st.species, st.level, 100);
            document.getElementById('m-name').innerText = st.name;
            const sp = SPECIES_LIST.find(s => s.id === st.species);
            document.getElementById('m-species').innerText = st.level > 0 ? sp.name : "神秘蛋";
            const prog = st.xp % 100;
            document.getElementById('m-xp-fill').style.width = prog + '%';
            document.getElementById('m-stats').innerText = `等级 Lv.${st.level} · 经验值 ${prog}/100`;
            document.getElementById('pet-modal').style.display = 'flex';
        }

        async function openPetModalById(id) {
            toggleLoading(true);
            const { data } = await sb.from('students').select('*').eq('id', id).single();
            if (data) openPetModal(data);
            toggleLoading(false);
        }

        async function feedPet(amount) {
            if(!currentStudent) return;
            toggleLoading(true);
            const newXp = currentStudent.xp + amount;
            const newLvl = Math.floor(newXp / 100);
            const { error } = await sb.from('students').update({ xp: newXp, level: newLvl }).eq('id', currentStudent.id);
            if(!error) {
                currentStudent.xp = newXp; currentStudent.level = newLvl;
                openPetModal(currentStudent);
            }
            toggleLoading(false);
        }

        async function adoptAction() {
            const name = document.getElementById('name-input').value.trim();
            if(!name) return alert("请输入学生姓名");
            toggleLoading(true);
            const sp = SPECIES_LIST[Math.floor(Math.random()*SPECIES_LIST.length)];
            const { error } = await sb.from('students').insert([{ name, species: sp.id, level: 0, xp: 0 }]);
            if(!error) {
                alert(`恭喜！${name} 的领养申请已通过，快去农场看看吧。`);
                document.getElementById('name-input').value = "";
                showScreen('farm-screen');
            }
            toggleLoading(false);
        }

        function renderAdoptGallery() {
            document.getElementById('species-gallery').innerHTML = SPECIES_LIST.map(s => `
                <div style="text-align:center; background:rgba(255,255,255,0.05); padding:8px; border-radius:12px;">
                    ${getPetSVG(s.id, 15, 35)}
                    <div style="font-size:9px; color:var(--dim); margin-top:4px;">${s.name}</div>
                </div>
            `).join('');
        }

        function closeModal() { document.getElementById('pet-modal').style.display = 'none'; }

        // 初始状态检测
        sb.from('students').select('count', { count: 'exact', head: true }).then(({error}) => {
            document.getElementById('conn-dot').style.background = error ? 'red' : 'var(--primary)';
        });
    </script>
</body>
</html>
