<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>我的游戏中心-最终匹配版</title>
    <script src="supabase.js"></script>
    <style>
        :root { --primary-color: #4CAF50; --bg-color: #1a1a1a; }
        body { margin: 0; background: var(--bg-color); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #menu-screen { display: flex; flex-direction: column; gap: 15px; text-align: center; width: 100%; padding: 20px; }
        .user-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background: #4CAF50; box-shadow: 0 0 10px #4CAF50; }
        .offline { background: #ff5252; }
        .menu-btn { background: #333; border: 2px solid var(--primary-color); color: white; padding: 20px; font-size: 1.2rem; border-radius: 18px; }
        #game-screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        #gameCanvas { border: 3px solid #444; background: #000; border-radius: 12px; }
        .d-pad { display: grid; grid-template-areas: ". up ." "left down right"; gap: 15px; margin-top: 30px; }
        .ctrl-btn { width: 75px; height: 75px; background: #333; border: none; border-radius: 20px; color: white; font-size: 1.5rem; box-shadow: 0 5px #000; }
        .ctrl-btn:active { transform: translateY(3px); box-shadow: 0 2px #000; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <div class="user-card">
            <div style="font-size: 0.75rem; margin-bottom: 10px;">
                <span id="cloud-status" class="status-dot offline"></span>
                <span id="status-text">系统自检中...</span>
            </div>
            <div id="user-display" style="font-size:1.2rem; font-weight:bold; color:#4CAF50;">玩家加载中...</div>
            <div style="font-size: 0.9rem; color: #888; margin-top: 5px;">云端最高纪录: <span id="record-display">0</span></div>
        </div>
        <h1>私人游戏中心</h1>
        <button class="menu-btn" onclick="startGame()">开始 经典贪吃蛇</button>
        <button class="menu-btn" onclick="localStorage.clear(); location.reload();" style="border-color:#555; font-size:0.8rem; margin-top:20px;">清空本地缓存(重置ID)</button>
    </div>

    <div id="game-screen">
        <div style="width:100%; display:flex; justify-content:space-between; padding:20px; box-sizing:border-box; margin-top:env(safe-area-inset-top);">
            <button onclick="exitGame()" style="background:#444; border:none; color:#fff; padding:8px 15px; border-radius:8px;">退出</button>
            <div id="score-text" style="font-size: 1.4rem; font-weight: bold;">得分: 0</div>
            <div id="high-score-text" style="font-size: 0.8rem; color: #888;">最高: 0</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="d-pad">
            <button class="ctrl-btn up" onclick="setDir('UP')">▲</button>
            <button class="ctrl-btn left" onclick="setDir('LEFT')">◀</button>
            <button class="ctrl-btn down" onclick="setDir('DOWN')">▼</button>
            <button class="ctrl-btn right" onclick="setDir('RIGHT')">▶</button>
        </div>
    </div>

    <script>
        // ======= [!! 填入你的钥匙 !!] =======
        const SB_URL = "https://qfplpzosjcvvyhcotodz.supabase.co"; 
        const SB_KEY = "sb_publishable_CxJNsIAs4JRcaPugv2fn1Q_TAKzFmQB"; 

        let supabase;
        // 注意：这里统一使用 highScore (大写S)
        let userProfile = { id: 'User_' + Math.floor(Math.random() * 9000 + 1000), nickname: '新玩家', highScore: 0 };

        async function initSystem() {
            const statusLabel = document.getElementById('status-text');
            try {
                if (!window.supabase) { alert("致命错误：supabase.js 加载失败！"); return; }
                supabase = window.supabase.createClient(SB_URL, SB_KEY);
                statusLabel.innerText = "读取本地数据...";

                const local = localStorage.getItem('my_game_center_data');
                if (local) userProfile = JSON.parse(local);
                refreshUI();

                statusLabel.innerText = "正在同步云端...";
                const { data, error } = await supabase.from('profiles').select('*').eq('id', userProfile.id).single();

                if (error) {
                    if (error.code === 'PGRST116') {
                        statusLabel.innerText = "创建云端档案...";
                        // 注意这里发送给云端的字段名必须是 highScore
                        await supabase.from('profiles').insert([
                            { id: userProfile.id, nickname: userProfile.nickname, highScore: userProfile.highScore }
                        ]);
                        setCloudStatus(true, "云端已就绪");
                    } else {
                        alert("云端报错：" + error.message);
                    }
                } else if (data) {
                    // 接收云端传回的 highScore
                    userProfile.highScore = Math.max(userProfile.highScore, data.highScore);
                    userProfile.nickname = data.nickname;
                    localStorage.setItem('my_game_center_data', JSON.stringify(userProfile));
                    setCloudStatus(true, "同步成功");
                }
                refreshUI();
            } catch (err) {
                alert("系统崩溃：" + err.message);
            }
        }

        function setCloudStatus(isOnline, text) {
            document.getElementById('cloud-status').className = isOnline ? "status-dot online" : "status-dot offline";
            document.getElementById('status-text').innerText = text;
        }

        function refreshUI() {
            document.getElementById('user-display').innerText = `${userProfile.nickname} (${userProfile.id})`;
            document.getElementById('record-display').innerText = userProfile.highScore;
            document.getElementById('high-score-text').innerText = "最高: " + userProfile.highScore;
        }

        // ======= 游戏逻辑 =======
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 20;
        let score = 0, snake = [], dx = gridSize, dy = 0, foodX, foodY, gameLoop;

        function startGame() {
            document.getElementById("menu-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "flex";
            canvas.width = Math.floor((window.innerWidth * 0.9) / gridSize) * gridSize;
            canvas.height = Math.floor((window.innerHeight * 0.4) / gridSize) * gridSize;
            resetGame();
        }

        function exitGame() { clearInterval(gameLoop); document.getElementById("menu-screen").style.display = "flex"; document.getElementById("game-screen").style.display = "none"; refreshUI(); }

        function resetGame() {
            clearInterval(gameLoop);
            score = 0; document.getElementById("score-text").innerText = "得分: 0";
            snake = [{x: 80, y: 80}, {x: 60, y: 80}];
            dx = gridSize; dy = 0;
            createFood();
            gameLoop = setInterval(gameTick, 150);
        }

        function createFood() {
            foodX = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            foodY = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        }

        function gameTick() {
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) return endGame();
            for (let i = 0; i < snake.length; i++) if (head.x === snake[i].x && head.y === snake[i].y) return endGame();
            snake.unshift(head);
            if (head.x === foodX && head.y === foodY) {
                score += 10; document.getElementById("score-text").innerText = "得分: " + score;
                createFood();
            } else { snake.pop(); }
            ctx.fillStyle = "#FF5252"; ctx.fillRect(foodX, foodY, gridSize-2, gridSize-2);
            snake.forEach((p, i) => { ctx.fillStyle = i === 0 ? "#4CAF50" : "#81C784"; ctx.fillRect(p.x, p.y, gridSize-2, gridSize-2); });
        }

        async function endGame() {
            clearInterval(gameLoop);
            if (score > userProfile.highScore) {
                userProfile.highScore = score;
                localStorage.setItem('my_game_center_data', JSON.stringify(userProfile));
                // 这里同步给云端时也要写 highScore
                await supabase.from('profiles').upsert({ 
                    id: userProfile.id, 
                    nickname: userProfile.nickname, 
                    highScore: userProfile.highScore 
                });
                alert("🎉 新纪录: " + score);
            } else { alert("游戏结束! 分数: " + score); }
            resetGame();
        }

        function setDir(dir) {
            if (dir === 'UP' && dy === 0) { dx = 0; dy = -gridSize; }
            if (dir === 'DOWN' && dy === 0) { dx = 0; dy = gridSize; }
            if (dir === 'LEFT' && dx === 0) { dx = -gridSize; dy = 0; }
            if (dir === 'RIGHT' && dx === 0) { dx = gridSize; dy = 0; }
        }

        window.onload = initSystem;
    </script>
</body>
</html>
