<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>原子诊断 V2.2</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { border: 1px solid #4CAF50; padding: 20px; margin: 20px; border-radius: 15px; }
        button { background: #4CAF50; color: white; border: none; padding: 15px; border-radius: 10px; width: 80%; font-size: 1.1rem; }
    </style>
</head>
<body>
    <h1>原子诊断 V2.2</h1>
    
    <div class="box">
        <div id="step-msg">正在等待脚本启动...</div>
    </div>

    <button onclick="location.reload()">强制刷新页面</button>

    <!-- 注意：我把库引用移到了最后，防止它卡住页面 -->
    <script src="supabase.js"></script>

    <script>
        // 【紧急通知】脚本已进入！
        alert("【弹窗 A】JS 脚本已启动！");

        const msg = document.getElementById('step-msg');
        msg.innerText = "脚本已启动，正在检查环境...";

        // 填入你的信息
        const URL = "https://qfplpzosjcvvyhcotodz.supabase.co";
        const KEY = "sb_publishable_CxJNsIAs4JRcaPugv2fn1Q_TAKzFmQB";

        async function runTest() {
            alert("【弹窗 B】开始环境自检");
            
            // 1. 测试本地存储
            try {
                localStorage.setItem('test_js', 'ok');
                alert("【弹窗 C】本地存储正常");
            } catch(e) {
                alert("【报错】本地存储被禁用！");
            }

            // 2. 检查 Supabase 库
            if (typeof window.supabase === 'undefined') {
                alert("【错误】找不到 Supabase 库！\n请检查：\n1. 仓库里有没有 supabase.js\n2. 文件名是否全小写\n3. 文件内容是否复制完整");
                msg.innerText = "错误：找不到库文件";
                return;
            }
            alert("【弹窗 D】库文件加载成功");

            // 3. 尝试初始化
            try {
                const client = window.supabase.createClient(URL, KEY);
                alert("【弹窗 E】客户端创建成功");
                
                msg.innerText = "正在尝试握手新加坡服务器...";
                const { data, error } = await client.from('profiles').select('count').limit(1);
                
                if (error) {
                    alert("【弹窗 F】连上了，但数据库报错：\n" + error.message);
                } else {
                    alert("【终极成功】恭喜！云端连接完全正常！");
                    msg.innerText = "所有系统正常，可以恢复游戏了！";
                }
            } catch(e) {
                alert("【崩溃】连接过程触发异常：" + e.message);
            }
        }

        // 直接运行
        runTest();
    </script>
</body>
</html>
