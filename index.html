<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>私人游戏&农场中心 V4.0</title>
    <!-- 引用已确认跑通的本地库 -->
    <script src="supabase.js"></script>
    <style>
        :root {
            --primary: #00ff88; --bg: #07070e; --panel: #0f0f1a; --border: #252535;
            --text: #dde0f5; --dim: #55556a; --gold: #ffcc00; --red: #ff4455;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; width: 100%; height: 100%; background: var(--bg); 
            color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; 
        }
        
        /* 界面切换容器 */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; overflow: hidden; }
        .screen.active { display: flex; }
        
        /* 通用页头 */
        .header { 
            padding: max(15px, env(safe-area-inset-top)) 20px 15px; 
            border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--panel); flex-shrink: 0;
        }
        .btn-back { 
            background: #1e1e2e; border: 1px solid var(--border); color: var(--text); 
            padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer;
        }

        /* 主界面 - 宫格布局 */
        #home-screen { padding: 20px; align-items: center; justify-content: center; gap: 20px; }
        .snake-hero {
            width: 100%; max-width: 350px; aspect-ratio: 16/9; background: linear-gradient(45deg, #004d40, #00ff88);
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,255,136,0.3); cursor: pointer; border: 2px solid rgba(255,255,255,0.2);
        }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 350px; }
        .menu-item {
            background: var(--panel); border: 1px solid var(--border); border-radius: 15px;
            padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer;
        }
        .menu-item:active { transform: scale(0.95); background: #1a1a2e; }

        /* 农场地图核心区 */
        #farm-container { flex: 1; position: relative; background: #0a1510; overflow: hidden; }
        .grass { position: absolute; inset: 0; background: radial-gradient(circle, #1a2e25 10%, transparent 10%); background-size: 40px 40px; opacity: 0.3; }
        
        /* 宠物精灵主体 */
        .pet-sprite { position: absolute; cursor: pointer; display: flex; flex-direction: column; align-items: center; z-index: 10; pointer-events: auto; }
        .pet-visual { position: relative; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; transition: transform 0.3s; }
        .pet-name { font-size: 11px; color: #fff; margin-top: 4px; text-shadow: 0 2px 4px #000; white-space: nowrap; }
        .pet-lvl { font-size: 9px; color: var(--primary); background: rgba(0,0,0,0.5); padding: 1px 4px; border-radius: 4px; }
        
        /* 弹窗系统 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--panel); width: 85%; max-width: 350px; border-radius: 25px; padding: 30px; border: 1px solid var(--border); text-align: center; }
        .xp-bar { width: 100%; height: 10px; background: #000; border-radius: 5px; margin: 15px 0; overflow: hidden; border: 1px solid #333; }
        .xp-fill { height: 100%; background: var(--primary); transition: width 0.5s ease; box-shadow: 0 0 10px var(--primary); }

        /* 领养 & 管理列表 */
        .scroll-box { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .student-card { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .snack-btn { background: #1e1e2e; border: 1px solid var(--primary); color: white; padding: 12px; border-radius: 10px; font-size: 14px; flex: 1; cursor: pointer; }
        .snack-btn:active { background: var(--primary); color: #000; }

        /* 王者光环 */
        .king-glow { filter: drop-shadow(0 0 15px var(--gold)); }
        
        /* 加载遮罩 */
        #loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; align-items: center; justify-content: center; color: var(--primary); }
    </style>
</head>
<body>

    <div id="loading-overlay">正在同步云端数据...</div>

    <!-- 1. 主大厅 -->
    <div id="home-screen" class="screen active">
        <div class="header" style="width: 100%; background: none; border: none;">
            <div style="font-weight: bold; color: var(--primary); letter-spacing: 2px;">ARCADE CENTER</div>
            <div id="status-dot" style="width:10px; height:10px; border-radius:50%; background:red;"></div>
        </div>
        
        <div class="snake-hero" onclick="alert('贪吃蛇逻辑加载中...请先玩农场')">
            <div style="font-size: 50px;">🐍</div>
            <div style="font-weight: bold; font-size: 24px; letter-spacing: 4px;">SNAKE GAME</div>
            <div style="font-size: 12px; opacity: 0.8;">CLASSIC ARCADE</div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="showScreen('farm-screen')">
                <div style="font-size: 30px;">🐾</div>
                <div style="font-size: 14px; font-weight: bold;">我的农场</div>
            </div>
            <div class="menu-item" onclick="showScreen('adopt-screen')">
                <div style="font-size: 30px;">🥚</div>
                <div style="font-size: 14px; font-weight: bold;">领养动物</div>
            </div>
            <div class="menu-item" onclick="showScreen('manage-screen')" style="grid-column: span 2;">
                <div style="font-size: 24px;">📋 学生档案管理中心</div>
            </div>
        </div>
        <p style="color:var(--dim); font-size: 10px;">Teacher Management System V4.0</p>
    </div>

    <!-- 2. 农场屏幕 -->
    <div id="farm-screen" class="screen">
        <div class="header">
            <button class="btn-back" onclick="showScreen('home-screen')">◀ 返回大厅</button>
            <div id="farm-title">我的农场 (0)</div>
            <button class="btn-back" onclick="refreshFarmData()">↻ 刷新</button>
        </div>
        <div id="farm-container">
            <div class="grass"></div>
        </div>
    </div>

    <!-- 3. 领养中心 -->
    <div id="adopt-screen" class="screen">
        <div class="header">
            <button class="btn-back" onclick="showScreen('home-screen')">◀ 返回大厅</button>
            <div style="font-weight: bold;">新宠领养</div>
            <div></div>
        </div>
        <div class="scroll-box">
            <div style="background: var(--panel); padding: 20px; border-radius: 20px; margin-bottom: 20px;">
                <label style="color: var(--dim); font-size: 12px; display: block; margin-bottom: 10px;">学生姓名</label>
                <input type="text" id="input-student-name" placeholder="请输入姓名..." style="width:100%; background:none; border:none; border-bottom:2px solid var(--primary); color:white; font-size:24px; outline:none; padding: 5px 0;">
            </div>
            <div id="adopt-gallery" style="display:grid; grid-template-columns: repeat(4,1fr); gap:10px;"></div>
            <button class="snack-btn" style="width:100%; margin-top:20px; height:60px; background:var(--gold); color:black; font-weight:bold;" onclick="adoptNew()">🎲 随机领养神秘蛋</button>
        </div>
    </div>

    <!-- 4. 学生名册 -->
    <div id="manage-screen" class="screen">
        <div class="header">
            <button class="btn-back" onclick="showScreen('home-screen')">◀ 返回大厅</button>
            <div style="font-weight: bold;">学生名册</div>
            <div></div>
        </div>
        <div class="scroll-box" id="manage-list"></div>
    </div>

    <!-- 5. 交互弹窗 -->
    <div id="pet-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="m-visual" style="margin-bottom: 10px;"></div>
            <h2 id="m-name" style="margin:0;">学生姓名</h2>
            <div id="m-species" style="color:var(--primary); font-size:14px; margin-bottom:10px;">物种</div>
            <div class="xp-bar"><div id="m-xp-fill" class="xp-fill"></div></div>
            <div id="m-stats" style="font-size:12px; color:var(--dim);">Lv.1 · 0/100</div>
            <div class="snack-bar">
                <button class="snack-btn" onclick="feed(20)">🍬 奖励零食 +20</button>
                <button class="snack-btn" style="border-color:var(--gold); color:var(--gold);" onclick="feed(100)">🏆 奖励奖杯 +100</button>
            </div>
        </div>
    </div>

    <script>
        // ======= 核心引擎与数据 =======
        const DB_CONFIG = {
            URL: 'https://qfplpzosjcvvyhcotodz.supabase.co',
            KEY: 'sb_publishable_CxJNsIAs4JRcaPugv2fn1Q_TAKzFmQB'
        };

        const SPECIES = [
            { id:'trex', name:'霸王龙', color:'#4CAF50', body:'M20,60 Q5,65 2,50 Q10,55 25,55 L25,75 Q50,85 80,75 Q90,50 85,30 Q70,20 40,30 L25,55' },
            { id:'duck', name:'呆呆鸭', color:'#FFEB3B', body:'M30,70 Q10,70 10,50 Q10,20 40,20 Q70,20 70,50 Q70,70 50,70 Z' },
            { id:'shark', name:'机械鲨', color:'#2196F3', body:'M10,50 Q10,20 50,20 L80,45 L50,70 Q10,70 10,50' },
            { id:'panda', name:'功夫熊猫', color:'#FFFFFF', body:'M20,50 Q20,20 50,20 Q80,20 80,50 Q80,80 50,80 Q20,80 20,50' },
            { id:'cat', name:'赛博猫', color:'#F48FB1', body:'M25,70 Q15,70 15,40 Q15,15 40,15 Q65,15 65,40 Q65,70 55,70 Z' }
        ];

        const sb = window.supabase.createClient(DB_CONFIG.URL, DB_CONFIG.KEY);
        let students = [];
        let sprites = [];
        let currentStudent = null;

        // ======= 动画渲染器 =======
        function renderPetSVG(speciesId, level, size = 60) {
            const sp = SPECIES.find(s => s.id === speciesId) || SPECIES[0];
            const stage = level === 0 ? 0 : (level < 5 ? 1 : (level < 10 ? 2 : (level < 15 ? 3 : 4)));
            
            // 蛋形态
            if (stage === 0) return `<svg width="${size}" height="${size}" viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="25" ry="35" fill="#eee" stroke="#ccc"/><path d="M35 40 L45 30 L55 45" fill="none" stroke="#999" stroke-width="2"/></svg>`;

            const scale = 0.4 + (stage * 0.15);
            const isKing = stage === 4;

            return `
            <svg width="${size}" height="${size}" viewBox="0 0 100 100" class="${isKing ? 'king-glow' : ''}">
                <defs>
                    <radialGradient id="grad-${sp.id}"><stop offset="0%" stop-color="${sp.color}"/><stop offset="100%" stop-color="#000"/></radialGradient>
                </defs>
                <g transform="translate(50,50) scale(${scale}) translate(-50,-50)">
                    <path d="${sp.body}" fill="url(#grad-${sp.id})" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
                    <!-- 眼睛 -->
                    <circle cx="65" cy="40" r="10" fill="white" />
                    <circle cx="68" cy="40" r="5" fill="black" />
                    <circle cx="66" cy="37" r="2" fill="white" />
                    ${isKing ? '<path d="M40,15 L50,2 L60,15" fill="none" stroke="gold" stroke-width="5" />' : ''}
                </g>
            </svg>`;
        }

        // ======= 逻辑控制 =======
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'farm-screen') refreshFarmData();
            if (id === 'manage-screen') loadManageList();
            if (id === 'adopt-screen') renderAdoptGallery();
        }

        async function refreshFarmData() {
            toggleLoading(true);
            const { data, error } = await sb.from('students').select('*');
            toggleLoading(false);
            if (error) return alert("同步失败: " + error.message);
            
            students = data;
            document.getElementById('farm-title').innerText = `我的农场 (${students.length})`;
            const container = document.getElementById('farm-container');
            container.querySelectorAll('.pet-sprite').forEach(el => el.remove());
            sprites = [];

            students.forEach(st => {
                const el = document.createElement('div');
                el.className = 'pet-sprite';
                el.innerHTML = `<div class="pet-visual">${renderPetSVG(st.species, st.level)}</div><div class="pet-name">${st.name}</div><div class="pet-lvl">Lv.${st.level}</div>`;
                
                const x = 50 + Math.random() * (window.innerWidth - 100);
                const y = 100 + Math.random() * (window.innerHeight - 300);
                el.style.transform = `translate(${x}px, ${y}px)`;
                el.onclick = () => openPetModal(st);
                container.appendChild(el);
                sprites.push({ id: st.id, el, x, y, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5 });
            });
        }

        // 农场漫游 AI
        setInterval(() => {
            if (!document.getElementById('farm-screen').classList.contains('active')) return;
            sprites.forEach(s => {
                s.x += s.vx * 2; s.y += s.vy * 2;
                if (s.x < 10 || s.x > window.innerWidth - 70) s.vx *= -1;
                if (s.y < 50 || s.y > window.innerHeight - 150) s.vy *= -1;
                s.el.style.transform = `translate(${s.x}px, ${s.y}px)`;
            });
        }, 50);

        async function loadManageList() {
            toggleLoading(true);
            const { data } = await sb.from('students').select('*').order('level', {ascending: false});
            toggleLoading(false);
            const list = document.getElementById('manage-list');
            list.innerHTML = data.map(st => `
                <div class="student-card">
                    <div style="width:50px">${renderPetSVG(st.species, st.level, 50)}</div>
                    <div style="flex:1">
                        <div style="font-weight:bold">${st.name}</div>
                        <div style="font-size:12px; color:var(--dim)">Lv.${st.level} · XP ${st.xp % 100}/100</div>
                    </div>
                    <button class="btn-back" onclick="openPetModalById('${st.id}')">互动</button>
                </div>
            `).join('');
        }

        function openPetModal(st) {
            currentStudent = st;
            document.getElementById('m-visual').innerHTML = renderPetSVG(st.species, st.level, 120);
            document.getElementById('m-name').innerText = st.name;
            const sp = SPECIES.find(s => s.id === st.species);
            document.getElementById('m-species').innerText = st.level > 0 ? sp.name : "神秘蛋";
            const progress = st.xp % 100;
            document.getElementById('m-xp-fill').style.width = progress + '%';
            document.getElementById('m-stats').innerText = `Lv.${st.level} · 经验值 ${progress}/100`;
            document.getElementById('pet-modal').style.display = 'flex';
        }

        async function feed(amount) {
            if (!currentStudent) return;
            toggleLoading(true);
            const newXp = currentStudent.xp + amount;
            const newLevel = Math.floor(newXp / 100);
            const { error } = await sb.from('students').update({ xp: newXp, level: newLevel }).eq('id', currentStudent.id);
            toggleLoading(false);
            if (!error) {
                currentStudent.xp = newXp; currentStudent.level = newLevel;
                openPetModal(currentStudent);
                if (document.getElementById('farm-screen').classList.contains('active')) refreshFarmData();
            }
        }

        async function adoptNew() {
            const name = document.getElementById('input-student-name').value.trim();
            if (!name) return alert("请输入学生姓名");
            toggleLoading(true);
            const randSp = SPECIES[Math.floor(Math.random()*SPECIES.length)];
            const { error } = await sb.from('students').insert([{ name, species: randSp.id, level: 0, xp: 0 }]);
            toggleLoading(false);
            if (!error) {
                alert(`🎉 ${name} 的领养申请已通过！请去农场孵化神秘蛋。`);
                document.getElementById('input-student-name').value = "";
                showScreen('farm-screen');
            }
        }

        function renderAdoptGallery() {
            document.getElementById('adopt-gallery').innerHTML = SPECIES.map(sp => `
                <div style="text-align:center; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">
                    ${renderPetSVG(sp.id, 15, 40)}
                    <div style="font-size:10px; margin-top:5px; color:var(--dim)">${sp.name}</div>
                </div>
            `).join('');
        }

        async function openPetModalById(id) {
            const { data } = await sb.from('students').select('*').eq('id', id).single();
            if (data) openPetModal(data);
        }

        function toggleLoading(show) { document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none'; }
        function closeModal() { document.getElementById('pet-modal').style.display = 'none'; }

        // 状态检测
        sb.from('students').select('count', { count: 'exact', head: true }).then(({error}) => {
            document.getElementById('status-dot').style.background = error ? 'red' : 'var(--primary)';
        });

    </script>
</body>
</html>
