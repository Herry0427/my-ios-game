<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Arcade Hub" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a12" />
  <meta name="color-scheme" content="dark" />
  <title>My Arcade Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%230a0a12' width='180' height='180'/%3E%3Ctext x='90' y='115' font-size='72' text-anchor='middle' fill='%2300ff99'%3E◆%3C/text%3E%3C/svg%3E" />
  <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22My%20Arcade%20Hub%22%2C%22short_name%22%3A%22Arcade%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22portrait%22%2C%22background_color%22%3A%22%230a0a12%22%2C%22theme_color%22%3A%22%2300ff99%22%7D" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-deep: #06060d; --bg-panel: rgba(12, 18, 28, 0.94); --neon-cyan: #00ffcc; --neon-magenta: #ff00aa;
      --neon-green: #39ff14; --neon-red: #ff3355; --text-dim: #6a7a8a;
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px); --safe-right: env(safe-area-inset-right, 0px);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100dvh; background: var(--bg-deep); color: var(--neon-cyan); overflow-x: hidden; }
    body {
      padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
      background-image: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(0, 255, 204, 0.08), transparent 50%),
        linear-gradient(180deg, #080810 0%, #06060d 40%, #030308 100%);
    }
    .screen {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      padding: 12px 16px calc(20px + var(--safe-bottom)); padding-top: calc(12px + var(--safe-top));
      overflow-y: auto; z-index: 1; opacity: 0; visibility: hidden; pointer-events: none;
      transform: scale(0.985) translateY(8px);
      transition: opacity 0.45s var(--ease-out), transform 0.45s var(--ease-out), visibility 0s linear 0.45s;
    }
    .screen.active { z-index: 2; opacity: 1; visibility: visible; pointer-events: auto; transform: scale(1) translateY(0);
      transition: opacity 0.45s var(--ease-out), transform 0.45s var(--ease-out), visibility 0s linear 0s; }
    .sync-strip {
      position: fixed; top: calc(var(--safe-top) + 6px); right: calc(var(--safe-right) + 8px); z-index: 10050;
      display: none; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; background: var(--bg-panel);
      border: 1px solid rgba(0, 255, 204, 0.35); font-size: 0.65rem; color: var(--neon-cyan);
    }
    .sync-strip.visible { display: flex; }
    .welcome-bar {
      background: var(--bg-panel); border: 1px solid rgba(0, 255, 204, 0.28); border-radius: 14px; padding: 14px 18px; margin-bottom: 14px;
    }
    .welcome-bar .hi { font-size: 1rem; font-weight: 700; color: #e8f4ff; margin-bottom: 6px; }
    .welcome-bar .hi span { color: var(--neon-magenta); }
    .welcome-bar .cloud-line { font-size: 0.9rem; color: var(--text-dim); }
    .welcome-bar .cloud-line strong { color: var(--neon-green); font-size: 1.15rem; }
    .arcade-title { font-size: clamp(1.2rem, 4.5vw, 1.6rem); font-weight: 800; letter-spacing: 0.1em; text-align: center; text-shadow: 0 0 20px rgba(0, 255, 204, 0.45); }
    .arcade-sub { text-align: center; color: var(--text-dim); font-size: 0.82rem; margin-bottom: 14px; }
    .grid-menu { display: grid; grid-template-columns: 1fr; gap: 12px; max-width: 520px; margin: 0 auto; width: 100%; }
    @media (min-width: 420px) { .grid-menu { grid-template-columns: repeat(3, 1fr); } }
    .tile-btn {
      min-height: 92px; padding: 12px; border-radius: 14px; border: 2px solid rgba(0, 255, 204, 0.35);
      background: linear-gradient(145deg, rgba(20, 30, 45, 0.95), rgba(8, 12, 22, 0.98)); color: var(--neon-cyan);
      font-size: 0.86rem; font-weight: 700; cursor: pointer; transition: transform 0.12s;
    }
    .tile-btn:active { transform: scale(0.94); }
    .tile-btn.coming { border-color: rgba(106, 122, 138, 0.4); color: var(--text-dim); cursor: not-allowed; opacity: 0.72; }
    .tile-badge { display: inline-block; margin-top: 6px; font-size: 0.62rem; padding: 4px 8px; border-radius: 6px; background: rgba(57, 255, 20, 0.15); color: var(--neon-green); }
    #leaderboard-screen .lb-list { flex: 1; max-width: 420px; width: 100%; margin: 16px auto 0; background: var(--bg-panel);
      border: 1px solid rgba(0, 255, 204, 0.22); border-radius: 14px; overflow: hidden; }
    .lb-row { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.88rem; }
    .lb-row .rank { color: var(--neon-magenta); font-weight: 800; width: 2rem; }
    .lb-row .name { flex: 1; color: #e0eef8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-row .pts { color: var(--neon-green); font-weight: 700; }
    .lb-empty { text-align: center; color: var(--text-dim); padding: 28px 12px; }
    .snake-topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px; flex-shrink: 0; }
    .back-btn { padding: 10px 12px; font-size: 0.86rem; font-weight: 600; color: var(--neon-cyan); background: var(--bg-panel);
      border: 1px solid rgba(0, 255, 204, 0.35); border-radius: 10px; cursor: pointer; }
    .back-btn:active { transform: scale(0.94); }
    .snake-score-hud { flex: 1; text-align: right; font-size: 0.8rem; color: var(--text-dim); }
    .snake-score-hud strong { color: var(--neon-green); }
    .snake-stage-wrap { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
    #snake-canvas {
      width: 100%; max-width: min(100vw - 32px, 400px); aspect-ratio: 1; border-radius: 12px; border: 2px solid rgba(0, 255, 204, 0.3);
      background: #0d1118; touch-action: none;
    }
    .snake-lobby, .snake-ready, .snake-face {
      position: absolute; inset: 0; max-width: min(100vw - 32px, 400px); width: 100%; margin: 0 auto; aspect-ratio: 1;
      background: rgba(5, 8, 16, 0.9); border: 2px solid rgba(0, 255, 204, 0.28); border-radius: 12px; z-index: 5;
      display: none; flex-direction: column; align-items: center; padding: 10px 8px; overflow: hidden;
    }
    .snake-lobby.visible, .snake-ready.visible, .snake-face.visible { display: flex; }
    .lobby-title { font-size: 0.75rem; color: var(--neon-cyan); margin-bottom: 8px; text-align: center; }
    .skin-strip { display: flex; gap: 8px; overflow-x: auto; max-width: 100%; padding: 4px 0 8px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
    .skin-card {
      flex: 0 0 100px; height: 108px; scroll-snap-align: start; border-radius: 10px; border: 2px solid rgba(0, 255, 204, 0.35);
      background: rgba(12, 18, 30, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 0.6rem; color: #b8c8d8; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .skin-card.selected { border-color: var(--neon-magenta); box-shadow: 0 0 16px rgba(255, 0, 170, 0.35); color: #fff; }
    .skin-card.locked { opacity: 0.45; cursor: not-allowed; }
    .skin-card .lock { font-size: 1.1rem; }
    .lobby-diff { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 8px 0; }
    .lobby-diff button {
      font-size: 0.65rem; padding: 8px 10px; border-radius: 8px; border: 2px solid rgba(0, 255, 204, 0.4);
      background: rgba(15, 22, 35, 0.95); color: var(--neon-cyan); cursor: pointer;
    }
    .lobby-diff button.sel { border-color: var(--neon-magenta); color: #fff; background: linear-gradient(145deg, rgba(80, 20, 60, 0.9), rgba(30, 12, 40, 0.95)); }
    .btn-start {
      margin-top: auto; width: 100%; max-width: 280px; padding: 14px; font-size: 0.95rem; font-weight: 800;
      border-radius: 14px; border: 2px solid var(--neon-green); color: #0a0a0a; background: linear-gradient(180deg, #5cff7a, #1a8a3a);
      cursor: pointer; box-shadow: 0 4px 20px rgba(57, 255, 20, 0.25);
    }
    .btn-start:active { transform: scale(0.97); }
    .snake-ready { justify-content: center; z-index: 4; }
    .snake-ready p { font-size: 0.7rem; text-align: center; line-height: 1.7; color: var(--neon-cyan); padding: 0 8px; }
    #snake-screen.death-shake { animation: deathShake 0.5s ease-out; }
    @keyframes deathShake {
      0%, 100% { transform: translate(0,0); } 10% { transform: translate(-7px,4px) rotate(-0.5deg); }
      20% { transform: translate(6px,-3px) rotate(0.4deg); } 30% { transform: translate(-5px,2px); }
      40% { transform: translate(4px,3px); } 50% { transform: translate(-3px,-2px); }
    }
    #snake-screen.death-flash::after {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 10040;
      background: rgba(200, 20, 40, 0.5); animation: deathFlash 0.4s ease-out forwards;
    }
    @keyframes deathFlash { 0% { opacity: 1; } 100% { opacity: 0; } }
    .dpad-grid {
      display: grid;
      grid-template-columns: 1fr min(72px, 22vmin) 1fr;
      grid-template-rows: 1fr min(72px, 22vmin) 1fr;
      gap: 12px;
      width: 100%;
      max-width: 280px;
      min-height: 228px;
      margin: 10px auto 0;
      padding-bottom: calc(10px + var(--safe-bottom));
      align-items: center;
      justify-items: center;
      touch-action: manipulation;
    }
    .dpad-cell-empty { min-width: 8px; min-height: 8px; pointer-events: none; }
    .dpad-fab {
      width: 72px; height: 72px; min-width: 72px; min-height: 72px; max-width: 72px; max-height: 72px;
      padding: 0; box-sizing: border-box; border-radius: 20px; aspect-ratio: 1;
      border: 2px solid rgba(0, 255, 204, 0.5);
      background: linear-gradient(180deg, rgba(36, 50, 72, 0.99), rgba(12, 18, 28, 0.99));
      color: var(--neon-cyan);
      font-size: 1.4rem; font-weight: 800; cursor: pointer; user-select: none;
      touch-action: manipulation;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.38), inset 0 2px 0 rgba(255, 255, 255, 0.1);
      transition: transform 0.06s ease, box-shadow 0.06s ease, filter 0.06s ease;
    }
    .dpad-fab:active, .dpad-fab.pressed {
      transform: translateY(5px);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.45), inset 0 4px 12px rgba(0, 0, 0, 0.45);
      filter: brightness(0.88);
    }
    .dpad-center {
      width: 52px; height: 52px; min-width: 52px; min-height: 52px; border-radius: 50%;
      padding: 0; box-sizing: border-box; aspect-ratio: 1;
      border: 2px solid rgba(255, 0, 170, 0.35);
      background: linear-gradient(160deg, rgba(40, 24, 50, 0.95), rgba(12, 8, 20, 0.98));
      color: rgba(255, 0, 170, 0.75);
      font-size: 1.1rem; font-weight: 800; cursor: default; user-select: none; pointer-events: none;
      touch-action: manipulation;
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.35);
    }
    .config-hint { margin-top: 16px; font-size: 0.7rem; color: var(--text-dim); text-align: center; line-height: 1.5; }
    .modal-root { position: fixed; inset: 0; z-index: 20000; display: flex; align-items: center; justify-content: center;
      padding: 24px; background: rgba(0, 0, 0, 0.72); opacity: 0; visibility: hidden; transition: opacity 0.35s; }
    .modal-root.visible { opacity: 1; visibility: visible; }
    .modal-pixel { width: 100%; max-width: 360px; padding: 24px; background: #1a1028; border: 4px solid #00ffcc;
      font-family: "Press Start 2P", monospace; }
    .modal-pixel h2 { font-size: 0.5rem; line-height: 1.9; color: #ffee55; text-align: center; margin: 0 0 16px; }
    .modal-pixel input { width: 100%; padding: 12px; font-family: "Press Start 2P", monospace; font-size: 0.42rem;
      border: 3px solid #ff00aa; background: #0d0812; color: #7dffbe; margin-bottom: 14px; }
    .modal-pixel button { font-family: "Press Start 2P", monospace; font-size: 0.4rem; padding: 12px 16px; border: 3px solid #00ffcc;
      background: linear-gradient(180deg, #2a5a4a, #153828); color: #bfff90; cursor: pointer; }
    .gameover-modal, .achv-modal {
      position: fixed; inset: 0; z-index: 15500; display: flex; align-items: center; justify-content: center; padding: 20px;
      background: rgba(0, 0, 0, 0.65); opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.35s;
    }
    .gameover-modal.visible, .achv-modal.visible { opacity: 1; visibility: visible; pointer-events: auto; }
    .gameover-card, .achv-card {
      width: 100%; max-width: 360px; padding: 24px; border-radius: 18px; background: var(--bg-panel);
      border: 2px solid rgba(255, 0, 85, 0.45); text-align: center;
    }
    .achv-card { border-color: rgba(0, 255, 204, 0.55); box-shadow: 0 0 40px rgba(0, 255, 204, 0.15); }
    .achv-card h3 { font-size: 1.2rem; color: var(--neon-green); margin: 0 0 12px; }
    .achv-card p { color: #c8d8e8; font-size: 0.9rem; line-height: 1.6; margin-bottom: 18px; }
    .cloud-off-banner {
      display: none; position: fixed; top: calc(var(--safe-top) + 6px); left: 12px; right: 12px; z-index: 10060;
      padding: 10px 12px; border-radius: 12px; border: 2px solid rgba(255, 120, 40, 0.65); background: rgba(45, 18, 8, 0.96);
      color: #ffb898; font-size: 0.7rem; line-height: 1.5;
    }
    .cloud-off-banner.visible { display: block; }
    .nick-warn { font-family: sans-serif !important; font-size: 0.58rem !important; color: #ff6688 !important; text-align: center; margin: 0 0 12px !important; }
  </style>
</head>
<body>
  <div id="cloud-off-banner" class="cloud-off-banner" role="status"></div>
  <div id="sync-strip" class="sync-strip"><span>📡</span><span>数据同步中…</span></div>

  <div id="nickname-modal" class="modal-root" aria-modal="true" role="dialog">
    <div class="modal-pixel">
      <h2>PLAYER NAME<br/>输入你的昵称</h2>
      <input id="nickname-input" type="text" maxlength="16" placeholder="NICKNAME" autocomplete="username" />
      <p id="nickname-cloud-warn" class="nick-warn" hidden></p>
      <p id="nickname-dup-msg" class="nick-warn" hidden></p>
      <div style="text-align:center"><button type="button" id="nickname-confirm">START</button></div>
    </div>
  </div>

  <div id="achv-modal" class="achv-modal" aria-modal="true">
    <div class="achv-card">
      <h3 id="achv-title">🎉 恭喜解锁</h3>
      <p id="achv-body"></p>
      <button type="button" id="achv-ok" style="padding:12px 24px;border-radius:12px;border:2px solid var(--neon-cyan);background:rgba(15,22,35,0.95);color:var(--neon-cyan);font-weight:700;cursor:pointer;width:100%">太棒了</button>
    </div>
  </div>

  <div id="gameover-modal" class="gameover-modal" aria-modal="true">
    <div class="gameover-card">
      <h3 style="margin:0 0 8px;color:var(--neon-red)">游戏结束</h3>
      <div style="font-size:2rem;font-weight:800;color:var(--neon-green)" id="go-score-display">0</div>
      <div class="go-record" id="go-record-msg" style="font-size:0.88rem;color:var(--neon-magenta);margin:8px 0"></div>
      <div id="go-sync-msg" style="font-size:0.75rem;color:#ffb020;margin-bottom:12px"></div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button type="button" id="go-replay" style="padding:14px;border-radius:12px;border:2px solid var(--neon-magenta);background:linear-gradient(145deg,rgba(90,24,70,0.95),rgba(35,12,45,0.98));color:#fff;font-weight:700">再玩一局</button>
        <button type="button" id="go-home" style="padding:14px;border-radius:12px;border:2px solid rgba(0,255,204,0.4);background:rgba(15,22,35,0.95);color:var(--neon-cyan);font-weight:700">返回大厅</button>
      </div>
    </div>
  </div>

  <section id="home-screen" class="screen active">
    <div class="welcome-bar">
      <div class="hi">Welcome, <span id="display-name">——</span></div>
      <div class="cloud-line">云端最高分: <strong id="cloud-high">—</strong></div>
    </div>
    <h1 class="arcade-title">My Arcade Hub</h1>
    <p class="arcade-sub">赛博街机厅 · 皮肤与云端同步</p>
    <div class="grid-menu">
      <button type="button" class="tile-btn" id="btn-snake">经典贪吃蛇 <span class="tile-badge">Skins</span></button>
      <button type="button" class="tile-btn" id="btn-leaderboard">名人堂 <span class="tile-badge">TOP10</span></button>
      <button type="button" class="tile-btn coming" disabled>待开发 <span class="tile-badge">Soon</span></button>
    </div>
    <p class="config-hint" id="supabase-hint">请在源码中填写 <code>SB_KEY</code>（Publishable），详见注释。</p>
  </section>

  <section id="leaderboard-screen" class="screen">
    <div class="snake-topbar">
      <button type="button" class="back-btn" id="lb-back">◀ 返回大厅</button>
    </div>
    <h2 class="arcade-title" style="font-size:1rem;margin-top:8px">名人堂 TOP 10</h2>
    <div class="lb-list" id="lb-list"><div class="lb-empty">加载中…</div></div>
  </section>

  <section id="snake-screen" class="screen">
    <div class="snake-topbar">
      <button type="button" class="back-btn" id="snake-back">◀ 返回大厅</button>
      <div class="snake-score-hud">长度 <strong id="snake-live-score">3</strong></div>
    </div>
    <div class="snake-stage-wrap">
      <canvas id="snake-canvas" width="400" height="400"></canvas>
      <div id="snake-lobby-overlay" class="snake-lobby">
        <div class="lobby-title">选择皮肤与难度</div>
        <div class="skin-strip" id="skin-strip"></div>
        <div class="lobby-diff" id="lobby-diff"></div>
        <button type="button" class="btn-start" id="snake-btn-start">开始游戏</button>
      </div>
      <div id="snake-ready-overlay" class="snake-ready">
        <p>请按<strong>方向键</strong>或<strong>点击下方控制盘</strong>开始</p>
      </div>
    </div>
    <div class="dpad-grid" id="snake-dpad">
      <div class="dpad-cell-empty" aria-hidden="true"></div>
      <div class="dpad-cell"><button type="button" class="dpad-fab" data-dir="up" aria-label="上">▲</button></div>
      <div class="dpad-cell-empty" aria-hidden="true"></div>
      <div class="dpad-cell"><button type="button" class="dpad-fab" data-dir="left" aria-label="左">◀</button></div>
      <div class="dpad-cell"><span class="dpad-center" id="dpad-center" role="presentation">◇</span></div>
      <div class="dpad-cell"><button type="button" class="dpad-fab" data-dir="right" aria-label="右">▶</button></div>
      <div class="dpad-cell-empty" aria-hidden="true"></div>
      <div class="dpad-cell"><button type="button" class="dpad-fab" data-dir="down" aria-label="下">▼</button></div>
      <div class="dpad-cell-empty" aria-hidden="true"></div>
    </div>
  </section>

  <section id="placeholder-screen" class="screen">
    <div class="snake-topbar"><button type="button" class="back-btn" id="placeholder-back">◀ 返回大厅</button></div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim)">即将推出</div>
  </section>


  <script>
(function () {
  'use strict';

  /** SB_URL / SB_KEY：Supabase JS createClient；可用 localStorage.myArcadeHub_sb_key 覆盖密钥 */
  var SB_URL = 'https://qfplpzosjcvvyhcotodz.supabase.co';
  var SB_KEY = 'sb_publishable_CxJNsIAs4JRcaPugv2fn1Q_TAKzFmQB';

  var STORAGE_USERID = 'userId';
  var LEGACY_PROFILE_ID = 'myArcadeHub_profileId';
  var STORAGE_NAME = 'myArcadeHub_nickname';

  var SKIN_ORDER = ['default','ghost','gold','rainbow','flame','cosmic'];
  var SKIN_META = {
    default: { label:'默认', ms:0 },
    ghost: { label:'幽灵', ms:27 },
    gold: { label:'土豪金', ms:96 },

    flame: { label:'烈焰', ms:222 },
    cosmic: { label:'宇宙星空', ms:328 }
  };
  var DIFF = {
    novice: { label:'新手', start:175, min:96, eat:1 },
    pro: { label:'专家', start:125, min:72, eat:2 },
    master:{ label:'疯子', start:82, min:48, eat:2 }
  };

  var GRID = 20, CELL = 400 / GRID;
  var canvas = document.getElementById('snake-canvas');
  var ctx = canvas && canvas.getContext('2d');
  var snakeScreen = document.getElementById('snake-screen');

  var sbClient = null;
  function resolveSbKey() {
    var ls = localStorage.getItem('myArcadeHub_sb_key');
    if (ls && ls.trim()) return ls.trim();
    var k = (SB_KEY || '').trim();
    if (!k || k.indexOf('YOUR_') === 0) return '';
    return k;
  }
  function getSb() {
    if (sbClient) return sbClient;
    var k = resolveSbKey();
    if (!k || typeof supabase === 'undefined') return null;
    sbClient = supabase.createClient(SB_URL, k);
    return sbClient;
  }

  var cloudHigh = 0;
  var unlockedSkins = ['default'];
  var cloudCurrentSkin = 'default';
  var unlockBaselineRound = ['default'];

  function num(v) { var n = Number(v); return Number.isFinite(n) ? n : 0; }

  function mergeUnlockedFromScore(score, baseArr) {
    var s = {};
    (baseArr && baseArr.length ? baseArr : ['default']).forEach(function (x) { s[x] = 1; });
    SKIN_ORDER.forEach(function (id) {
      if (SKIN_META[id].ms > 0 && score >= SKIN_META[id].ms) s[id] = 1;
    });
    return SKIN_ORDER.filter(function (id) { return s[id]; });
  }

  function isSkinUnlocked(id, arr) {
    if (id === 'default') return true;
    return (arr || unlockedSkins).indexOf(id) >= 0;
  }

  function setSync(on) {
    var el = document.getElementById('sync-strip');
    if (el) el.classList.toggle('visible', !!on);
  }

  function cloudBanner() {
    var bar = document.getElementById('cloud-off-banner');
    if (!bar) return;
    if (resolveSbKey()) { bar.classList.remove('visible'); return; }
    bar.innerHTML = '<strong>云端未连接</strong>：请填写源码顶部 <code>SB_KEY</code>（Publishable），或 <code>localStorage.myArcadeHub_sb_key</code> 后刷新。';
    bar.classList.add('visible');
  }

  async function fetchProfile() {
    var c = getSb();
    var el = document.getElementById('cloud-high');
    if (!c) { if (el) el.textContent = '离线'; return; }
    setSync(true);
    try {
      var id = getUserId();
      var r = await c.from('profiles').select('highScore, nickname, unlockedSkins, currentSkin').eq('id', id).maybeSingle();
      if (r.error) throw r.error;
      var row = r.data;
      cloudHigh = row ? num(row.highScore) : 0;
      if (el) el.textContent = String(cloudHigh);
      if (row && row.nickname) localStorage.setItem(STORAGE_NAME, String(row.nickname).trim());
      if (row && row.unlockedSkins && row.unlockedSkins.length) unlockedSkins = row.unlockedSkins.slice();
      else unlockedSkins = mergeUnlockedFromScore(cloudHigh, ['default']);
      if (row && row.currentSkin) cloudCurrentSkin = row.currentSkin;
      document.getElementById('display-name').textContent = getNickname() || '——';
    } catch (e) {
      console.warn(e); if (el) el.textContent = '—';
    } finally { setSync(false); }
  }

  async function persistRound(finalScore, prevUnlockedSnapshot, activeSkin) {
    var c = getSb();
    if (!c) return { ok:false, reason:'no_client', newUnlocks:[] };
    var id = getUserId();
    var name = getNickname() || 'Player';
    var selRemote = await c.from('profiles').select('highScore, unlockedSkins, currentSkin').eq('id', id).maybeSingle();
    var rh = selRemote.data ? num(selRemote.data.highScore) : 0;
    var ru = (selRemote.data && selRemote.data.unlockedSkins) ? selRemote.data.unlockedSkins.slice() : ['default'];
    var mergedHigh = Math.max(finalScore, rh, cloudHigh);
    var mergedUnlock = mergeUnlockedFromScore(mergedHigh, ru);
    var beforeSet = {};
    prevUnlockedSnapshot.forEach(function (x) { beforeSet[x] = 1; });
    var newUnlocks = mergedUnlock.filter(function (sid) {
      return sid !== 'default' && !beforeSet[sid];
    });
    var curSkin = activeSkin || cloudCurrentSkin || 'default';
    if (!isSkinUnlocked(curSkin, mergedUnlock)) curSkin = 'default';

    setSync(true);
    try {
      var up = await c.from('profiles').upsert({
        id: id,
        nickname: name,
        highScore: mergedHigh,
        unlockedSkins: mergedUnlock,
        currentSkin: curSkin,
        updated_at: new Date().toISOString()
      }, { onConflict: 'id' });
      if (up.error) throw up.error;
      cloudHigh = mergedHigh;
      unlockedSkins = mergedUnlock;
      cloudCurrentSkin = curSkin;
      document.getElementById('cloud-high').textContent = String(cloudHigh);
      return { ok:true, improved: finalScore > rh, newUnlocks: newUnlocks };
    } catch (e) {
      console.warn(e); return { ok:false, error: e, newUnlocks: newUnlocks };
    } finally { setSync(false); }
  }

  async function upsertNicknameOnly(nm) {
    var c = getSb();
    if (!c) return { ok: true };
    setSync(true);
    try {
      var id = getUserId();
      var ex = await c.from('profiles').select('highScore, unlockedSkins, currentSkin').eq('id', id).maybeSingle();
      var hs = ex.data ? num(ex.data.highScore) : 0;
      var us = (ex.data && ex.data.unlockedSkins) ? ex.data.unlockedSkins : mergeUnlockedFromScore(hs, ['default']);
      var cs = (ex.data && ex.data.currentSkin) ? ex.data.currentSkin : 'default';
      var res = await c.from('profiles').upsert({
        id: id, nickname: nm, highScore: hs, unlockedSkins: us, currentSkin: cs, updated_at: new Date().toISOString()
      }, { onConflict: 'id' });
      if (res.error) throw res.error;
      await fetchProfile();
      return { ok: true };
    } catch (e) {
      console.warn(e);
      var code = e && (e.code || (e.error && e.error.code));
      var msg = String((e && e.message) || e || '');
      var dup = code === '23505' || /duplicate key|unique constraint/i.test(msg);
      return { ok: false, duplicate: dup };
    } finally { setSync(false); }
  }

  function getUserId() {
    var id = localStorage.getItem(STORAGE_USERID);
    if (!id) {
      var leg = localStorage.getItem(LEGACY_PROFILE_ID);
      if (leg) {
        id = leg;
        localStorage.setItem(STORAGE_USERID, id);
        try { localStorage.removeItem(LEGACY_PROFILE_ID); } catch (e) {}
      } else {
        id = crypto.randomUUID
          ? crypto.randomUUID()
          : 'u-' + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
        localStorage.setItem(STORAGE_USERID, id);
      }
    }
    return id;
  }
  function hasNickname() { var n = localStorage.getItem(STORAGE_NAME); return !!(n && String(n).trim()); }
  function getNickname() { return (localStorage.getItem(STORAGE_NAME) || '').trim(); }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function (el) { el.classList.toggle('active', el.id === id); });
    if (id === 'snake-screen' && window.snakeBoot) window.snakeBoot();
  }
  window.showScreen = showScreen;

  async function fetchLb() {
    var c = getSb(); var listEl = document.getElementById('lb-list');
    if (!c) { listEl.innerHTML = '<div class="lb-empty">未连接 SB_KEY</div>'; return; }
    setSync(true);
    try {
      // profiles.id 主键 = 每设备 userId 一行，按 highScore 降序即每人最高分榜
      var r = await c
        .from('profiles')
        .select('id, nickname, highScore')
        .order('highScore', { ascending: false })
        .limit(10);
      if (r.error) throw r.error;
      var rows = r.data || [];
      if (!rows.length) { listEl.innerHTML = '<div class="lb-empty">暂无数据</div>'; return; }
      listEl.innerHTML = rows.map(function (x, i) {
        return '<div class="lb-row"><span class="rank">'+(i+1)+'</span><span class="name">'+(x.nickname||'匿名')+'</span><span class="pts">'+num(x.highScore)+'</span></div>';
      }).join('');
    } catch (e) { listEl.innerHTML = '<div class="lb-empty">加载失败</div>'; }
    finally { setSync(false); }
  }

  var phase = 'lobby';
  var playing = false;
  var dir = {x:1,y:0}, nextDir = {x:1,y:0};
  var snake = [], food = {x:10,y:10};
  var loopId = null, tickMs = 140, eatD = 2, lastTick = 0;
  var selDiff = 'novice';
  var activeSkin = 'default';
  var ghostTrail = [], embers = [], goldFlashUntil = 0;

  function getDiff() { return DIFF[selDiff] || DIFF.novice; }

  function buildLobby() {
    var strip = document.getElementById('skin-strip');
    var diffEl = document.getElementById('lobby-diff');
    strip.innerHTML = '';
    SKIN_ORDER.forEach(function (sid, i) {
      var meta = SKIN_META[sid];
      var ok = isSkinUnlocked(sid);
      var card = document.createElement('div');
      card.className = 'skin-card' + (ok ? '' : ' locked') + (sid === activeSkin ? ' selected' : '');
      card.dataset.skin = sid;
      if (ok) {
        card.innerHTML = '<div style="font-weight:800;color:var(--neon-cyan)">' + meta.label + '</div><div style="opacity:0.7;margin-top:4px;font-size:0.55rem">'+sid+'</div>';
        card.onclick = function () {
          activeSkin = sid;
          Array.prototype.forEach.call(strip.children, function (c) {
            c.classList.toggle('selected', c.dataset.skin === sid && !c.classList.contains('locked'));
          });
        };
      } else {
        card.innerHTML = '<span class="lock">🔒</span><div style="margin-top:4px;font-size:0.55rem">需'+meta.ms+'分</div>';
      }
      strip.appendChild(card);
    });
    diffEl.innerHTML = '';
    ['novice','pro','master'].forEach(function (k) {
      var b = document.createElement('button');
      b.type = 'button'; b.textContent = DIFF[k].label; b.className = selDiff === k ? 'sel' : '';
      b.onclick = function () {
        selDiff = k; tickMs = DIFF[k].start; eatD = DIFF[k].eat;
        Array.prototype.forEach.call(diffEl.children, function (x, j) {
          var keys = ['novice','pro','master'];
          x.className = selDiff === keys[j] ? 'sel' : '';
        });
      };
      diffEl.appendChild(b);
    });
  }

  function resetSnake() {
    snake = [{x:5,y:10},{x:4,y:10},{x:3,y:10}];
    dir = {x:1,y:0}; nextDir = {x:1,y:0};
    tickMs = getDiff().start; eatD = getDiff().eat;
    spawnFood();
    ghostTrail = []; embers = []; goldFlashUntil = 0;
    hud();
  }

  function spawnFood() {
    var occ = {}; snake.forEach(function (s) { occ[s.x+','+s.y]=1; });
    var t = 0; do {
      food = { x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID) }; t++;
    } while (occ[food.x+','+food.y] && t < 400);
  }

  function hud() { document.getElementById('snake-live-score').textContent = String(snake.length); }

  function step() {
    dir.x = nextDir.x; dir.y = nextDir.y;
    var head = snake[0];
    var nx = head.x + dir.x, ny = head.y + dir.y;
    if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) { die(); return; }
    snake.unshift({x:nx,y:ny});
    var ate = nx === food.x && ny === food.y;
    if (ate) {
      spawnFood();
      var d = getDiff();
      tickMs = Math.max(d.min, tickMs - eatD);
      if (activeSkin === 'gold') goldFlashUntil = performance.now() + 220;
    } else snake.pop();
    for (var i = 1; i < snake.length; i++) {
      if (snake[i].x === nx && snake[i].y === ny) { die(); return; }
    }
    if (activeSkin === 'ghost') {
      ghostTrail.push({x:nx,y:ny,t:performance.now()});
      while (ghostTrail.length > 8) ghostTrail.shift();
    }
    if (activeSkin === 'flame' && playing) {
      embers.push({x:nx,y:ny}); if (embers.length > 14) embers.shift();
    }
    hud();
  }

  function die() {
    playing = false; phase = 'dead';
    if (loopId) cancelAnimationFrame(loopId); loopId = null;
    if (snakeScreen) { snakeScreen.classList.add('death-shake'); snakeScreen.classList.add('death-flash'); }
    setTimeout(function () {
      if (snakeScreen) { snakeScreen.classList.remove('death-shake'); snakeScreen.classList.remove('death-flash'); }
    }, 500);
    var score = snake.length;
    var prevSnap = unlockBaselineRound.slice();
    var prevBest = num(cloudHigh);
    draw();
    Promise.resolve(persistRound(score, prevSnap, activeSkin)).then(function (sync) {
      var pending = (sync && sync.newUnlocks && sync.newUnlocks.length) ? sync.newUnlocks.slice() : [];
      var sc = score;
      function openGO() {
        document.getElementById('go-score-display').textContent = String(sc);
        var msg = document.getElementById('go-record-msg');
        var syncEl = document.getElementById('go-sync-msg');
        if (sync && sync.ok && sync.improved) msg.textContent = '🏆 打破个人纪录！';
        else if (prevBest > 0) msg.textContent = '云端纪录 ' + prevBest + ' · 差距 ' + Math.max(0, prevBest - sc);
        else msg.textContent = '继续加油！';
        if (sync && sync.ok) syncEl.textContent = '✓ 云端已同步（含皮肤进度）';
        else if (sync && sync.reason === 'no_client') syncEl.textContent = '⚠️ 未配置 SB_KEY';
        else syncEl.textContent = sync && sync.error ? '⚠️ 同步失败' : '';
        document.getElementById('gameover-modal').classList.add('visible');
      }
      function chain() {
        if (!pending.length) { openGO(); return; }
        var sid = pending.shift();
        document.getElementById('achv-body').innerHTML = '🎉 恭喜！你已觉醒 <strong style="color:var(--neon-magenta)">' + SKIN_META[sid].label + '</strong> ！';
        document.getElementById('achv-modal').classList.add('visible');
        var okBtn = document.getElementById('achv-ok');
        okBtn.onclick = function () {
          document.getElementById('achv-modal').classList.remove('visible');
          okBtn.onclick = null;
          chain();
        };
      }
      if (pending.length) chain();
      else openGO();
    });
  }

  function draw() {
    if (!ctx) return;
    var w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#0a0e14'; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle = 'rgba(0,255,204,0.06)';
    for (var g = 0; g <= GRID; g++) {
      ctx.beginPath(); ctx.moveTo(g*CELL,0); ctx.lineTo(g*CELL,h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,g*CELL); ctx.lineTo(w,g*CELL); ctx.stroke();
    }
    if (performance.now() < goldFlashUntil && activeSkin === 'gold') {
      ctx.fillStyle = 'rgba(255, 215, 0, 0.35)'; ctx.fillRect(0,0,w,h);
    }
    ctx.fillStyle = '#ff3355'; ctx.beginPath();
    ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL*0.32, 0, Math.PI*2); ctx.fill();

    var skin = activeSkin;
    var t = performance.now();
    if (skin === 'ghost') {
      ghostTrail.forEach(function (tr) {
        var age = (t - tr.t) / 450;
        var a = Math.max(0, 0.32 - age * 0.32);
        ctx.fillStyle = 'rgba(80,255,120,'+a+')';
        ctx.fillRect(tr.x*CELL+1, tr.y*CELL+1, CELL-2, CELL-2);
      });
    }
    snake.forEach(function (seg, idx) {
      var pad = 1;
      if (skin === 'rainbow') {
        ctx.fillStyle = 'hsl('+(((t/22|0)+idx*28)%360)+',88%,58%)';
      } else if (skin === 'gold') {
        var grd = ctx.createLinearGradient(seg.x*CELL, seg.y*CELL, seg.x*CELL+CELL, seg.y*CELL+CELL);
        grd.addColorStop(0,'#ffeaa7'); grd.addColorStop(1,'#b8860b');
        ctx.fillStyle = grd;
      } else if (skin === 'cosmic') {
        ctx.fillStyle = 'rgba(70,35,110,0.5)';
        ctx.fillRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2);
        var sp = ((idx * 11 + (t/70|0)) % 4);
        ctx.fillStyle = sp ? 'rgba(255,255,255,0.85)' : 'rgba(180,200,255,0.45)';
        ctx.fillRect(seg.x*CELL+CELL*0.25, seg.y*CELL+CELL*0.3, 3, 3);
        return;
      } else if (skin === 'flame') {
        ctx.fillStyle = idx === 0 ? '#ff6600' : '#ff2200';
      } else if (skin === 'ghost') {
        ctx.fillStyle = 'rgba(60,255,100,0.42)';
      } else {
        ctx.fillStyle = idx === 0 ? '#5cff4a' : '#39ff14';
      }
      if (skin !== 'cosmic') ctx.fillRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2);
      if (skin === 'flame' && idx === 0) {
        ctx.fillStyle = 'rgba(255,200,80,0.9)'; ctx.beginPath();
        ctx.arc(seg.x*CELL+CELL/2, seg.y*CELL+CELL/2, 5, 0, Math.PI*2); ctx.fill();
      }
    });
    if (skin === 'flame') {
      embers.forEach(function (em, ei) {
        ctx.fillStyle = 'rgba(255,50,40,'+(0.25 + (ei%3)*0.08)+')';
        ctx.fillRect(em.x*CELL+2, em.y*CELL+CELL*0.75, CELL-4, 2);
      });
    }
  }

  function loop(ts) {
    if (!playing) return;
    if (ts - lastTick >= tickMs) { lastTick = ts; step(); }
    draw();
    loopId = requestAnimationFrame(loop);
  }

  function beginPlay(dx, dy) {
    if (phase !== 'ready') return;
    phase = 'playing'; playing = true;
    document.getElementById('snake-ready-overlay').classList.remove('visible');
    if (!(dir.x === -dx && dir.y === -dy)) nextDir = {x:dx,y:dy};
    lastTick = performance.now();
    loopId = requestAnimationFrame(loop);
  }

  function setDir(dx, dy) {
    if (phase === 'ready') { beginPlay(dx, dy); return; }
    if (!playing) return;
    if (dir.x === -dx && dir.y === -dy) return;
    if (nextDir.x === -dx && nextDir.y === -dy) return;
    nextDir = {x:dx,y:dy};
  }

  window.snakeBoot = function () {
    document.getElementById('gameover-modal').classList.remove('visible');
    document.getElementById('achv-modal').classList.remove('visible');
    phase = 'lobby'; playing = false;
    if (loopId) cancelAnimationFrame(loopId); loopId = null;
    activeSkin = isSkinUnlocked(cloudCurrentSkin) ? cloudCurrentSkin : 'default';
    selDiff = 'novice';
    resetSnake();
    buildLobby();
    unlockBaselineRound = unlockedSkins.slice();
    document.getElementById('snake-lobby-overlay').classList.add('visible');
    document.getElementById('snake-ready-overlay').classList.remove('visible');
    draw();
  };

  document.getElementById('snake-btn-start').onclick = function () {
    if (!isSkinUnlocked(activeSkin)) return;
    unlockBaselineRound = unlockedSkins.slice();
    phase = 'ready';
    document.getElementById('snake-lobby-overlay').classList.remove('visible');
    document.getElementById('snake-ready-overlay').classList.add('visible');
  };

  document.querySelectorAll('#snake-dpad .dpad-fab').forEach(function (btn) {
    var d = btn.getAttribute('data-dir');
    var map = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
    function ap() { var v = map[d]; if (v) setDir(v[0], v[1]); }
    btn.addEventListener('touchstart', function (e) { e.preventDefault(); btn.classList.add('pressed'); ap(); }, { passive:false });
    btn.addEventListener('touchend', function () { btn.classList.remove('pressed'); });
    btn.addEventListener('mousedown', function () { btn.classList.add('pressed'); ap(); });
    btn.addEventListener('mouseup', function () { btn.classList.remove('pressed'); });
    btn.addEventListener('mouseleave', function () { btn.classList.remove('pressed'); });
    btn.addEventListener('click', function (e) { e.preventDefault(); });
  });

  document.addEventListener('keydown', function (e) {
    if (!document.getElementById('snake-screen').classList.contains('active')) return;
    var map = { ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],W:[0,-1],s:[0,1],S:[0,1],a:[-1,0],A:[-1,0],d:[1,0],D:[1,0] };
    if (!map[e.key]) return;
    e.preventDefault();
    setDir(map[e.key][0], map[e.key][1]);
  });

  document.getElementById('btn-snake').onclick = function () { showScreen('snake-screen'); };
  document.getElementById('btn-leaderboard').onclick = function () { showScreen('leaderboard-screen'); fetchLb(); };
  document.getElementById('lb-back').onclick = function () { showScreen('home-screen'); };
  document.getElementById('snake-back').onclick = function () {
    playing = false; phase = 'lobby'; if (loopId) cancelAnimationFrame(loopId);
    showScreen('home-screen'); fetchProfile();
  };
  document.getElementById('go-replay').onclick = function () {
    document.getElementById('gameover-modal').classList.remove('visible');
    window.snakeBoot();
  };
  document.getElementById('go-home').onclick = function () {
    document.getElementById('gameover-modal').classList.remove('visible');
    showScreen('home-screen'); fetchProfile();
  };
  document.getElementById('placeholder-back').onclick = function () { showScreen('home-screen'); };

  document.getElementById('nickname-confirm').onclick = async function () {
    var dupEl = document.getElementById('nickname-dup-msg');
    if (dupEl) { dupEl.hidden = true; dupEl.textContent = ''; }
    var inp = document.getElementById('nickname-input');
    var raw = inp && inp.value.trim() ? inp.value.trim().slice(0, 16) : '玩家' + ((Math.random() * 9000 + 1000) | 0);
    var c = getSb();
    if (c) {
      var avail = await c.rpc('is_nickname_available', { p_nick: raw, p_uid: getUserId() });
      if (avail.error) {
        if (dupEl) {
          dupEl.textContent = '昵称校验失败，请稍后重试';
          dupEl.hidden = false;
        }
        return;
      }
      if (avail.data === false) {
        if (dupEl) {
          dupEl.textContent = '该昵称已被大触抢先，换一个吧';
          dupEl.hidden = false;
        }
        return;
      }
    }
    localStorage.setItem(STORAGE_NAME, raw);
    document.getElementById('nickname-modal').classList.remove('visible');
    var saved = await upsertNicknameOnly(raw);
    if (!saved.ok && dupEl) {
      dupEl.textContent = saved.duplicate
        ? '该昵称已被大触抢先，换一个吧'
        : '保存失败，请检查网络后重试';
      dupEl.hidden = false;
      document.getElementById('nickname-modal').classList.add('visible');
      localStorage.removeItem(STORAGE_NAME);
    }
    cloudBanner();
  };

  function resize() {
    if (!canvas) return;
    var sz = Math.min(canvas.parentElement.clientWidth||400, 400);
    canvas.style.width = sz+'px'; canvas.style.height = sz+'px';
    CELL = 400 / GRID; draw();
  }
  window.addEventListener('resize', resize);
  resize();

  if (resolveSbKey()) document.getElementById('supabase-hint').style.display = 'none';
  getUserId();
  cloudBanner();
  document.getElementById('display-name').textContent = getNickname() || '——';
  if (!hasNickname()) document.getElementById('nickname-modal').classList.add('visible');
  else fetchProfile();
})();
  </script>
</body>
