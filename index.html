<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCADE HUB FIX</title>

<!-- ✅ 正确的 Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --primary: #00ff88;
    --bg: #07070e;
    --panel: #0f0f1a;
    --border: #252535;
    --text: #dde0f5;
}
body { margin:0;background:var(--bg);color:white;font-family:sans-serif;}
.screen{display:none;height:100vh;}
.screen.active{display:block;}
.header{padding:10px;background:#111;display:flex;justify-content:space-between}
button{padding:6px 12px}
#loading{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center}
canvas{background:#000}
</style>
</head>

<body>

<div id="loading">加载中...</div>

<!-- 首页 -->
<div id="home" class="screen active">
    <div class="header">
        <div>ARCADE HUB</div>
        <div id="status">●</div>
    </div>

    <button onclick="go('farm')">农场</button>
    <button onclick="go('game')">贪吃蛇</button>
</div>

<!-- 农场 -->
<div id="farm" class="screen">
    <div class="header">
        <button onclick="go('home')">返回</button>
        <div>农场</div>
    </div>
    <div id="farm-list"></div>
</div>

<!-- 游戏 -->
<div id="game" class="screen">
    <div class="header">
        <button onclick="stopGame();go('home')">返回</button>
        <div id="score">0</div>
    </div>
    <canvas id="cv"></canvas>
</div>

<script>
/* ================= 初始化 ================= */

const SB_URL = 'https://qfplpzosjcvvyhcotodz.supabase.co';
const SB_KEY = 'sb_publishable_CxJNsIAs4JRcaPugv2fn1Q_TAKzFmQB';

let sb = null;

try {
    if (!window.supabase) throw new Error("Supabase没加载");
    sb = window.supabase.createClient(SB_URL, SB_KEY);
    console.log("Supabase OK");
} catch(e) {
    alert("Supabase加载失败");
}

/* ================= 通用 ================= */

function loading(b){
    document.getElementById('loading').style.display = b?'flex':'none';
}

function go(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    if(id==='farm') loadFarm();
    if(id==='game') startGame();
}

/* ================= 农场 ================= */

async function loadFarm(){
    loading(true);
    try{
        const {data,error} = await sb.from('students').select('*');

        if(error) throw error;

        const box = document.getElementById('farm-list');
        box.innerHTML = data.map(x=>`
            <div style="padding:10px;border-bottom:1px solid #333">
                ${x.name} - Lv.${x.level}
            </div>
        `).join('');

    }catch(e){
        console.error(e);
        alert("数据库错误："+e.message+"（大概率RLS没关）");
    }finally{
        loading(false);
    }
}

/* ================= 贪吃蛇 ================= */

let snake,dir,food,timer,score;

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

function startGame(){
    cv.width=300;cv.height=300;
    snake=[{x:100,y:100}];
    dir='RIGHT';
    score=0;
    spawn();

    if(timer) clearInterval(timer);
    timer=setInterval(tick,150);
}

function tick(){
    let h={...snake[0]};

    if(dir==='UP')h.y-=10;
    if(dir==='DOWN')h.y+=10;
    if(dir==='LEFT')h.x-=10;
    if(dir==='RIGHT')h.x+=10;

    if(h.x<0||h.y<0||h.x>=300||h.y>=300){
        stopGame();
        alert("结束："+score);
        return;
    }

    snake.unshift(h);

    if(h.x===food.x&&h.y===food.y){
        score+=10;
        spawn();
    }else{
        snake.pop();
    }

    draw();
}

function draw(){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,300,300);

    ctx.fillStyle=getComputedStyle(document.documentElement)
        .getPropertyValue('--primary').trim() || '#0f0';

    snake.forEach(p=>ctx.fillRect(p.x,p.y,8,8));

    ctx.fillStyle="red";
    ctx.fillRect(food.x,food.y,8,8);

    document.getElementById('score').innerText=score;
}

function spawn(){
    food={
        x:Math.floor(Math.random()*30)*10,
        y:Math.floor(Math.random()*30)*10
    }
}

function stopGame(){
    clearInterval(timer);
}

/* 键盘控制 */
document.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp')dir='UP';
    if(e.key==='ArrowDown')dir='DOWN';
    if(e.key==='ArrowLeft')dir='LEFT';
    if(e.key==='ArrowRight')dir='RIGHT';
});

/* ================= 连接检测 ================= */

(async()=>{
    try{
        const {error}=await sb.from('students').select('id').limit(1);
        document.getElementById('status').style.color = error?'red':'#0f0';
    }catch{
        document.getElementById('status').style.color='red';
    }
})();
</script>

</body>
</html>
