<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>私人游戏中心 V2.0</title>
    
    <!-- 引用你仓库里的本地库文件 -->
    <script src="supabase.js"></script>

    <style>
        :root { --primary-color: #4CAF50; --bg-color: #1a1a1a; }
        body { margin: 0; background: var(--bg-color); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* 菜单界面 */
        #menu-screen { display: flex; flex-direction: column; gap: 15px; text-align: center; width: 100%; padding: 20px; }
        .user-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background: #4CAF50; box-shadow: 0 0 10px #4CAF50; }
        .offline { background: #ff5252; }
        
        h1 { font-size: 1.8rem; color: #fff; margin: 10px 0; }
        .menu-btn { background: #333; border: 2px solid var(--primary-color); color: white; padding: 18px; font-size: 1.2rem; border-radius: 18px; -webkit-tap-highlight-color: transparent; }
        .menu-btn:active { background: var(--primary-color); transform: scale(0.98); }

        /* 游戏界面 */
        #game-screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; padding-top: env(safe-area-inset-top); }
        .header { width: 100%; display: flex; justify-content: space-between; padding: 15px 25px; box-sizing: border-box; align-items: center; }
        #gameCanvas { border: 3px solid #444; background: #000; border-radius: 12px; }

        /* 方向控制盘 */
        .d-pad { display: grid; grid-template-areas: ". up ." "left down right"; gap: 15px; margin-top: 25px; }
        .ctrl-btn { width: 75px; height: 75px; background: #333; border: none; border-radius: 20px; color: white; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px #000; -webkit-tap-highlight-color: transparent; }
        .ctrl-btn:active { transform: translateY(3px); box-shadow: 0 2px #000; background: #444; }
        .up { grid-area: up; } .down { grid-area: down; } .left { grid-area: left; } .right { grid-area: right; }
        .back-btn { background: #444; border: none; color: #fff; padding: 8px 15px; border-radius: 8px; }
    </style>
</head>
<body>

    <!-- 主菜单 -->
    <div id="menu-screen">
        <div class="user-card">
            <div style="font-size: 0.75rem; margin-bottom: 10px;">
                <span id="cloud-status" class="status-dot offline"></span>
                <span id="status-text">读取本地数据...</span>
            </div>
            <div id="user-display" style="font-size:1.2rem; font-weight:bold; color:#4CAF50;">加载中...</div>
            <div style="font-size: 0.9rem; color: #888; margin-top: 5px;">云端最高纪录: <span id="record-display">0</span></div>
        </div>
        <h1>私人游戏中心 V2.0</h1>
        <button class="menu-btn" onclick="showGame()">🎮 开始经典贪吃蛇</button>
        <button class="menu-btn" onclick="localStorage.clear(); location.reload();" style="border-color:#555; font-size:0.8rem; margin-top:20px;">重置 ID (调试用)</button>
    </div>

    <!-- 游戏层 -->
    <div id="game-screen">
        <div class="header">
            <button class="back-btn" onclick="showMenu()">退出</button>
            <div id="scoreVal" style="font-size: 1.4rem; font-weight: bold;">得分: 0</div>
            <div id="game-record" style="font-size: 0.8rem; color: #888;">纪录: 0</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="d-pad">
            <button class="ctrl-btn up" onclick="handleDir('UP')">▲</button>
            <button class="ctrl-btn left" onclick="handleDir('LEFT')">◀</button>
            <button class="ctrl-btn down" onclick="handleDir('DOWN')">▼</button>
            <button class="ctrl-btn right" onclick="handleDir('RIGHT')">▶</button>
        </div>
    </div>

    <script>
        // ======= [!! 核心配置 !!] =======
        const SB_URL = "https://qfplpzosjcvvyhcotodz.supabase.co"; 
        const SB_KEY = "sb_publishable_CxJNsIAs4JRcaPugv2fn1Q_TAKzFmQB"; 

        let supabase;
        let userProfile = { id: 'User_' + Math.floor(Math.random() * 9000 + 1000), nickname: '新玩家', highScore: 0 };

        async function initSystem() {
            const statusLabel = document.getElementById('status-text');
            try {
                // 1. 本地加载
                const localData = localStorage.getItem('my_game_center_data');
                if (localData) userProfile = JSON.parse(localData);
                updateUI();

                // 2. 连接云端
                if (!window.supabase) { alert("错误：仓库缺少 supabase.js 文件！"); return; }
                supabase = window.supabase.createClient(SB_URL, SB_KEY);
                statusLabel.innerText = "正在同步新加坡云端...";

                const { data, error } = await supabase.from('profiles').select('*').eq('id', userProfile.id).single();

                if (error) {
                    if (error.code === 'PGRST116') {
                        statusLabel.innerText = "云端档案创建中...";
                        // 发送给云端时，列名必须叫 highScore (匹配你的数据库)
                        await supabase.from('profiles').insert([
                            { id: userProfile.id, nickname: userProfile.nickname, highScore: userProfile.highScore }
                        ]);
                        setStatus(true, "云端连接成功");
                    } else {
                        alert("云端报错：" + error.message);
                    }
                } else if (data) {
                    // 同步最高分
                    userProfile.highScore = Math.max(userProfile.highScore, data.highScore);
                    userProfile.nickname = data.nickname;
                    saveLocal();
                    setStatus(true, "同步完成");
                }
            } catch (err) {
                alert("手机系统拦截报错：" + err.message);
            }
        }

        function setStatus(online, text) {
            document.getElementById('cloud-status').className = online ? "status-dot online" : "status-dot offline";
            document.getElementById('status-text').innerText = text;
        }

        function saveLocal() {
            localStorage.setItem('my_game_center_data', JSON.stringify(userProfile));
            updateUI();
        }

        function updateUI() {
            document.getElementById('user-display').innerText = `${userProfile.nickname} (${userProfile.id})`;
            document.getElementById('record-display').innerText = userProfile.highScore;
            document.getElementById('game-record').innerText = "纪录: " + userProfile.highScore;
        }

        // ======= 贪吃蛇逻辑 =======
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 20;
        let score = 0, snake = [], dx = gridSize, dy = 0, foodX, foodY, gameLoop;

        function showGame() {
            document.getElementById("menu-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "flex";
            canvas.width = Math.floor((window.innerWidth * 0.9) / gridSize) * gridSize;
            canvas.height = Math.floor((window.innerHeight * 0.42) / gridSize) * gridSize;
            resetGame();
        }

        function showMenu() {
            clearInterval(gameLoop);
            document.getElementById("menu-screen").style.display = "flex";
            document.getElementById("game-screen").style.display = "none";
            updateUI();
        }

        function resetGame() {
            clearInterval(gameLoop);
            score = 0; document.getElementById("scoreVal").innerText = "得分: 0";
            snake = [{x: 80, y: 80}, {x: 60, y: 80}];
            dx = gridSize; dy = 0;
            createFood();
            gameLoop = setInterval(draw, 150);
        }

        function createFood() {
            foodX = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            foodY = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        }

        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) return gameOver();
            for (let i = 0; i < snake.length; i++) if (head.x === snake[i].x && head.y === snake[i].y) return gameOver();
            
            snake.unshift(head);
            if (head.x === foodX && head.y === foodY) {
                score += 10; document.getElementById("scoreVal").innerText = "得分: " + score;
                createFood();
            } else { snake.pop(); }

            ctx.fillStyle = "#FF5252"; ctx.fillRect(foodX, foodY, gridSize-2, gridSize-2);
            snake.forEach((p, i) => { ctx.fillStyle = i === 0 ? "#4CAF50" : "#81C784"; ctx.fillRect(p.x, p.y, gridSize-2, gridSize-2); });
        }

        async function gameOver() {
            clearInterval(gameLoop);
            if (score > userProfile.highScore) {
                userProfile.highScore = score;
                saveLocal();
                // 同步给云端
                await supabase.from('profiles').upsert({ id: userProfile.id, nickname: userProfile.nickname, highScore: userProfile.highScore });
                alert("🎉 新纪录: " + score);
            } else { alert("游戏结束! 分数: " + score); }
            resetGame();
        }

        function handleDir(dir) {
            if (dir === 'UP' && dy === 0) { dx = 0; dy = -gridSize; }
            if (dir === 'DOWN' && dy === 0) { dx = 0; dy = gridSize; }
            if (dir === 'LEFT' && dx === 0) { dx = -gridSize; dy = 0; }
            if (dir === 'RIGHT' && dx === 0) { dx = gridSize; dy = 0; }
        }

        window.onload = initSystem;
    </script>
</body>
</html>
