<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>宠物农场中心 V3.0</title>
    <!-- 引用已跑通的本地库 -->
    <script src="supabase.js"></script>
    <style>
        :root {
            --primary: #00ff88; --bg: #0a0a12; --panel: #161625; --border: #2d2d3f;
            --text: #e0e0f0; --dim: #707085; --gold: #ffcc00; --red: #ff4455;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* 界面切换容器 */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .screen.active { display: flex; }
        
        /* 通用页头 */
        .header { padding: max(15px, env(safe-area-inset-top)) 20px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--panel); }
        .btn-back { background: none; border: 1px solid var(--dim); color: var(--dim); padding: 5px 12px; border-radius: 6px; font-size: 14px; }
        
        /* 农场地图核心区 */
        #farm-container { flex: 1; position: relative; background: radial-gradient(circle at 50% 100%, #15251a 0%, #0a0a12 100%); overflow: hidden; }
        .grass-layer { position: absolute; inset: 0; opacity: 0.1; background-image: radial-gradient(#00ff88 1px, transparent 1px); background-size: 30px 30px; }
        
        /* 宠物精灵主体 */
        .pet-sprite { position: absolute; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: transform 0.1s linear; z-index: 10; }
        .pet-visual { position: relative; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
        .pet-name { font-size: 11px; color: #fff; margin-top: 4px; text-shadow: 0 2px 4px #000; font-weight: bold; }
        .pet-lvl { font-size: 9px; color: var(--primary); opacity: 0.8; }
        
        /* 状态气泡 */
        .bubble { position: absolute; top: -35px; background: white; color: #000; padding: 4px 10px; border-radius: 12px; font-size: 10px; white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .bubble.show { opacity: 1; }

        /* 进化光晕效果 */
        .stage-4 { filter: drop-shadow(0 0 12px var(--gold)) !important; }
        .evolution-ring { position: absolute; inset: -5px; border: 2px solid var(--gold); border-radius: 50%; opacity: 0; }
        .stage-4 .evolution-ring { opacity: 0.5; animation: spin 4s linear infinite; }
        @keyframes spin { from {transform: rotate(0deg)} to {transform: rotate(360deg)} }

        /* 领养界面 */
        .adopt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; overflow-y: auto; }
        .adopt-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 10px; text-align: center; }
        .adopt-card.locked { opacity: 0.5; filter: grayscale(1); }

        /* 零食按钮排版 */
        .snack-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 15px; }
        .snack-btn { background: #333; border: 1px solid var(--primary); color: white; padding: 10px; border-radius: 8px; font-size: 14px; flex: 1; min-width: 80px; }

        /* 弹窗系统 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--panel); width: 85%; max-width: 350px; border-radius: 20px; padding: 25px; border: 1px solid var(--border); text-align: center; }
        
        /* 进度条 */
        .xp-container { width: 100%; height: 8px; background: #000; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        #xp-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
    </style>
</head>
<body>

    <!-- 1. 主菜单 -->
    <div id="home-screen" class="screen active">
        <div class="header">
            <div style="font-weight: bold; color: var(--primary);">ARCADE HUB</div>
            <div id="player-tag" style="font-size: 14px;">加载中...</div>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; padding: 40px;">
            <button class="snack-btn" style="width: 100%; height: 80px; font-size: 20px;" onclick="showScreen('farm-screen')">🐾 进入我的农场</button>
            <button class="snack-btn" style="width: 100%; height: 80px; font-size: 20px; border-color: var(--gold); color: var(--gold);" onclick="showScreen('adopt-screen')">✨ 领养新动物</button>
            <button class="snack-btn" style="width: 100%;" onclick="showScreen('manage-screen')">📋 学生名册管理</button>
        </div>
    </div>

    <!-- 2. 农场地图 -->
    <div id="farm-screen" class="screen">
        <div class="header">
            <button class="btn-back" onclick="showScreen('home-screen')">返回</button>
            <div id="farm-stat">正在同步农场...</div>
            <button class="btn-back" onclick="refreshFarm()">↻ 刷新</button>
        </div>
        <div id="farm-container">
            <div class="grass-layer"></div>
            <!-- 宠物会在这里动态生成 -->
        </div>
    </div>

    <!-- 3. 领养选秀 -->
    <div id="adopt-screen" class="screen">
        <div class="header">
            <button class="btn-back" onclick="showScreen('home-screen')">返回</button>
            <div style="font-weight: bold;">领养中心</div>
            <div style="width:40px;"></div>
        </div>
        <div style="padding: 20px;">
            <input type="text" id="new-student-name" placeholder="输入学生姓名..." style="width:100%; padding:15px; border-radius:10px; border:none; background:var(--panel); color:white; font-size:18px;">
            <p style="color:var(--dim); font-size:12px; margin-top:10px;">👑 传说级形态展示：</p>
        </div>
        <div class="adopt-grid" id="gallery-grid"></div>
        <div style="padding: 20px;">
            <button id="btn-adopt-confirm" class="snack-btn" style="width:100%; height:60px; background:var(--gold); color:black; font-weight:bold;" onclick="performAdoption()">🎲 随机领养神秘蛋</button>
        </div>
    </div>

    <!-- 4. 互动弹窗 -->
    <div id="pet-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-visual" style="margin-bottom: 15px;"></div>
            <h2 id="modal-name" style="margin: 5px 0;">学生姓名</h2>
            <div id="modal-species" style="color:var(--primary); font-size:14px;">物种名称</div>
            <div class="xp-container"><div id="xp-fill"></div></div>
            <div id="modal-stats" style="font-size: 13px; color: var(--dim);">Lv.1 · XP 0/100</div>
            <div class="snack-bar">
                <button class="snack-btn" onclick="feed(10)">🍪 饼干 +10</button>
                <button class="snack-btn" onclick="feed(50)">🍰 蛋糕 +50</button>
                <button class="snack-btn" style="border-color:var(--gold)" onclick="feed(100)">🏆 奖杯 +100</button>
            </div>
            <button class="btn-back" style="margin-top: 20px; width: 100%;" onclick="closeModal()">关闭</button>
        </div>
    </div>

    <script>
        // ======= 配置区 =======
        const CONFIG = {
            URL: 'https://qfplpzosjcvvyhcotodz.supabase.co',
            KEY: 'sb_publishable_CxJNsIAs4JRcaPugv2fn1Q_TAKzFmQB',
            SPECIES: [
                { id:'trex', name:'霸王龙', color:'#4CAF50', feature:'🦖' },
                { id:'duck', name:'呆呆鸭', color:'#FFEB3B', feature:'🦆' },
                { id:'cat', name:'赛博猫', color:'#E91E63', feature:'🐈' },
                { id:'shark', name:'机械鲨', color:'#2196F3', feature:'🦈' },
                { id:'panda', name:'功夫熊猫', color:'#FFFFFF', feature:'🐼' },
                { id:'owl', name:'学霸鸮', color:'#795548', feature:'🦉' },
                { id:'unicorn', name:'彩虹兽', color:'#CE93D8', feature:'🦄' },
                { id:'bee', name:'勤劳蜂', color:'#FBC02D', feature:'🐝' },
                { id:'pig', name:'招财猪', color:'#F48FB1', feature:'🐷' },
                { id:'wolf', name:'极地狼', color:'#B0BEC5', feature:'🐺' },
                { id:'frog', name:'锦鲤蛙', color:'#8BC34A', feature:'🐸' },
                { id:'bunny', name:'月兔', color:'#EEEEEE', feature:'🐰' },
                { id:'monkey', name:'大圣', color:'#FF9800', feature:'🐒' },
                { id:'fox', name:'灵狐', color:'#FF5722', feature:'🦊' },
                { id:'crab', name:'蟹将军', color:'#EF5350', feature:'🦀' },
                { id:'elephant', name:'神象', color:'#90CAF9', feature:'🐘' },
                { id:'seahorse', name:'海马', color:'#4FC3F7', feature:'🐠' },
                { id:'dragon', name:'青龙', color:'#00E676', feature:'🐲' },
                { id:'lion', name:'狮子王', color:'#FFD54F', feature:'🦁' },
                { id:'penguin', name:'冰川企鹅', color:'#3F51B5', feature:'🐧' }
            ]
        };

        const sb = window.supabase.createClient(CONFIG.URL, CONFIG.KEY);
        let playerNick = localStorage.getItem('arcadeNick') || '老师';
        let currentPet = null;
        let sprites = [];

        // ======= 绘图引擎 (核心修复) =======
        function drawPet(speciesId, level, size = 60) {
            const sp = CONFIG.SPECIES.find(s => s.id === speciesId) || CONFIG.SPECIES[0];
            const stage = level === 0 ? 0 : (level < 5 ? 1 : (level < 10 ? 2 : (level < 15 ? 3 : 4)));
            
            // 阶段 0: 神秘蛋
            if (stage === 0) return `<svg width="${size}" height="${size}" viewBox="0 0 100 100"><ellipse cx="50" cy="60" rx="30" ry="38" fill="#dcdde1" stroke="#2f3640" stroke-width="2"/><path d="M35 40 L45 30 L55 45 L65 35" fill="none" stroke="#7f8c8d" stroke-width="2"/></svg>`;

            // 参数化绘制逻辑
            const scale = 0.5 + (stage * 0.15); // 随阶段变大
            const glowClass = stage === 4 ? 'stage-4' : '';
            
            return `
                <svg width="${size}" height="${size}" viewBox="0 0 100 100" class="${glowClass}">
                    <defs>
                        <radialGradient id="grad-${sp.id}">
                            <stop offset="0%" stop-color="${sp.color}" />
                            <stop offset="100%" stop-color="#000" />
                        </radialGradient>
                    </defs>
                    <g transform="translate(50,50) scale(${scale}) translate(-50,-50)">
                        <circle cx="50" cy="55" r="35" fill="url(#grad-${sp.id})" />
                        <text x="50" y="65" font-size="45" text-anchor="middle">${sp.feature}</text>
                        ${stage >= 3 ? '<path d="M20 20 L30 5 L40 20" fill="none" stroke="gold" stroke-width="3"/>' : ''}
                    </g>
                    <circle class="evolution-ring" cx="50" cy="50" r="45" fill="none" stroke="gold" stroke-width="1" stroke-dasharray="5,5" />
                </svg>
            `;
        }

        // ======= 界面逻辑 =======
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'farm-screen') refreshFarm();
            if (id === 'adopt-screen') renderGallery();
        }

        async function refreshFarm() {
            const container = document.getElementById('farm-container');
            container.querySelectorAll('.pet-sprite').forEach(el => el.remove());
            sprites = [];

            const { data, error } = await sb.from('students').select('*');
            if (error) return alert("同步失败: " + error.message);
            
            document.getElementById('farm-stat').innerText = `农场中有 ${data.length} 只宠物`;

            data.forEach(st => {
                const el = document.createElement('div');
                el.className = 'pet-sprite';
                el.innerHTML = `
                    <div class="bubble" id="b-${st.id}">想吃零食...</div>
                    <div class="pet-visual">${drawPet(st.species, st.level)}</div>
                    <div class="pet-name">${st.name}</div>
                    <div class="pet-lvl">Lv.${st.level}</div>
                `;
                
                // 随机初始位置
                const x = 50 + Math.random() * (window.innerWidth - 100);
                const y = 100 + Math.random() * (window.innerHeight - 300);
                el.style.transform = `translate(${x}px, ${y}px)`;
                
                el.onclick = () => openModal(st);
                container.appendChild(el);

                sprites.push({ id: st.id, el, x, y, vx: Math.random()-0.5, vy: Math.random()-0.5 });
            });
        }

        // 简易漫游 AI
        setInterval(() => {
            if (!document.getElementById('farm-screen').classList.contains('active')) return;
            sprites.forEach(s => {
                s.x += s.vx * 2; s.y += s.vy * 2;
                if (s.x < 20 || s.x > window.innerWidth - 80) s.vx *= -1;
                if (s.y < 80 || s.y > window.innerHeight - 200) s.vy *= -1;
                s.el.style.transform = `translate(${s.x}px, ${s.y}px)`;
                
                if (Math.random() < 0.01) {
                    const b = document.getElementById('b-' + s.id);
                    b.classList.add('show');
                    setTimeout(() => b.classList.remove('show'), 2000);
                }
            });
        }, 50);

        function openModal(st) {
            currentPet = st;
            document.getElementById('modal-visual').innerHTML = drawPet(st.species, st.level, 120);
            document.getElementById('modal-name').innerText = st.name;
            const sp = CONFIG.SPECIES.find(s => s.id === st.species);
            document.getElementById('modal-species').innerText = st.level > 0 ? sp.name : "神秘蛋";
            
            const xpNeeded = 100;
            const progress = (st.xp % xpNeeded);
            document.getElementById('xp-fill').style.width = `${progress}%`;
            document.getElementById('modal-stats').innerText = `Lv.${st.level} · 经验 ${progress}/100`;
            
            document.getElementById('pet-modal').style.display = 'flex';
        }

        async function feed(amount) {
            if (!currentPet) return;
            const btn = event.target;
            btn.disabled = true;

            let newXp = (currentPet.xp || 0) + amount;
            let newLevel = Math.floor(newXp / 100);
            
            const { error } = await sb.from('students').update({ 
                xp: newXp, 
                level: newLevel 
            }).eq('id', currentPet.id);

            if (!error) {
                currentPet.xp = newXp;
                currentPet.level = newLevel;
                openModal(currentPet); // 刷新弹窗
                refreshFarm(); // 刷新农场形象
            }
            btn.disabled = false;
        }

        async function performAdoption() {
            const name = document.getElementById('new-student-name').value.trim();
            if (!name) return alert("请输入学生名字");
            
            const randomSpecies = CONFIG.SPECIES[Math.floor(Math.random() * CONFIG.SPECIES.length)];
            const btn = document.getElementById('btn-adopt-confirm');
            btn.innerText = "正在开启盲盒...";
            btn.disabled = true;

            const { error } = await sb.from('students').insert([
                { name: name, species: randomSpecies.id, level: 0, xp: 0 }
            ]);

            if (!error) {
                alert(`🎊 领养成功！${name} 获得了一个神秘蛋，快去农场喂食吧！`);
                document.getElementById('new-student-name').value = "";
                showScreen('farm-screen');
            } else {
                alert("失败: " + error.message);
            }
            btn.innerText = "🎲 随机领养神秘蛋";
            btn.disabled = false;
        }

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = CONFIG.SPECIES.map(sp => `
                <div class="adopt-card">
                    <div style="filter: drop-shadow(0 0 5px gold)">${drawPet(sp.id, 20, 40)}</div>
                    <div style="font-size:10px; margin-top:5px;">${sp.name}</div>
                </div>
            `).join('');
        }

        function closeModal() { document.getElementById('pet-modal').style.display = 'none'; }

        // 初始化
        document.getElementById('player-tag').innerText = `老师: ${playerNick}`;
        renderGallery();

    </script>
</body>
</html>
