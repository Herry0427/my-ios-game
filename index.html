<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b1220" />
  <title>手机功能面板</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="homePage" class="page home-page">
    <header class="top-bar">
      <h1>手机功能面板</h1>
      <p>6 个模块（已实现：天气预报、足球）</p>
      <section class="weather-actions">
        <button id="clearCacheReload">清除缓存并刷新代码</button>
      </section>
    </header>
    <section class="module-grid">
      <button class="module-card primary" data-module="weather">
        <span class="module-icon">🌤️</span>
        <span class="module-title">天气预报</span>
        <span class="module-subtitle">当前定位 · 7日预报</span>
      </button>
      <button class="module-card" data-module="football">
        <span class="module-icon">⚽</span>
        <span class="module-title">足球</span>
        <span class="module-subtitle">世界杯 + 五大联赛 + 欧冠</span>
      </button>
      <button class="module-card" data-module="birthday">
        <span class="module-icon">📅</span>
        <span class="module-title">生日倒计时</span>
        <span class="module-subtitle">未来两个月生日提醒</span>
      </button>
      <button class="module-card" data-module="module4">
        <span class="module-icon">💬</span>
        <span class="module-title">模块 4</span>
        <span class="module-subtitle">功能占位</span>
      </button>
      <button class="module-card" data-module="module5">
        <span class="module-icon">📊</span>
        <span class="module-title">模块 5</span>
        <span class="module-subtitle">功能占位</span>
      </button>
      <button class="module-card" data-module="module6">
        <span class="module-icon">⚙️</span>
        <span class="module-title">模块 6</span>
        <span class="module-subtitle">功能占位</span>
      </button>
    </section>
  </main>

  <section id="weatherPage" class="page hidden">
    <header class="top-bar">
      <button id="backHome" class="back-btn">← 返回</button>
      <h2>天气预报</h2>
      <p id="locationText">定位中...</p>
    </header>

    <section id="weatherStatus" class="status-card">准备获取天气...</section>
    <section id="weatherList" class="weather-list"></section>
  </section>

  <section id="footballPage" class="page hidden">
    <header class="top-bar">
      <button id="backHomeFromFootball" class="back-btn">← 返回</button>
      <h2>足球赛程</h2>
      <p>进入本页自动加载并合并：本地 data 包、浏览器缓存、config.js 中的远程 HTTPS 赛程（可选）。</p>
    </header>

    <section id="footballStatus" class="status-card">准备获取赛事列表...</section>
    <section id="leagueList" class="league-list"></section>
  </section>

  <section id="leagueDetailPage" class="page hidden">
    <header class="top-bar">
      <button id="backToFootball" class="back-btn">← 返回足球列表</button>
      <h2 id="leagueDetailTitle">赛事详情</h2>
      <p>未开赛显示时间，已完赛显示比分（各近10场）</p>
    </header>
    <section id="leagueDetailStatus" class="status-card">准备获取赛事数据...</section>

    <section class="wc-block">
      <h3>未开赛</h3>
      <div id="leagueUpcomingList" class="wc-list"></div>
    </section>
    <section class="wc-block">
      <h3>已完赛</h3>
      <div id="leagueFinishedList" class="wc-list"></div>
    </section>
  </section>

  <section id="birthdayPage" class="page hidden">
    <header class="top-bar">
      <button id="backHomeFromBirthday" class="back-btn">← 返回</button>
      <h2>生日倒计时</h2>
      <p>展示未来两个月内即将过生日的人（已过不显示）</p>
    </header>

    <section id="birthdayStatus" class="status-card">请先添加生日信息。</section>
    <section id="birthdayUpcomingList" class="birthday-list"></section>

    <section class="birthday-form-card">
      <h3>添加生日</h3>
      <label class="form-label">姓名</label>
      <input id="birthdayNameInput" type="text" placeholder="例如：张三" />

      <label class="form-label">出生日期</label>
      <input id="birthdayDateInput" type="date" />

      <label class="form-label">生日类型</label>
      <select id="birthdayCalendarType">
        <option value="solar">国历（公历）</option>
        <option value="lunar">农历</option>
      </select>

      <p id="birthdayCalendarHint" class="form-hint">国历：按公历日期计算倒计时。</p>
      <button id="addBirthdayBtn">保存生日</button>
    </section>

    <section class="birthday-form-card">
      <h3>已添加人员</h3>
      <div id="birthdayPeopleList" class="birthday-people-list"></div>
    </section>
  </section>

  <aside id="toast" class="toast hidden"></aside>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
