<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ARCADE">
<title>ARCADE HUB</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

:root {
  --bg:      #07070e;
  --panel:   #0f0f1a;
  --border:  #252535;
  --green:   #00ff88;
  --green2:  #00cc66;
  --yellow:  #ffcc00;
  --red:     #ff4455;
  --blue:    #44aaff;
  --purple:  #bb66ff;
  --orange:  #ff8833;
  --cyan:    #00eeff;
  --text:    #dde0f5;
  --dim:     #55556a;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html,body{
  width:100%;height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'VT323',monospace;
  overflow:hidden;
  position:fixed;
  top:0;left:0;
}

/* scanlines */
body::after{
  content:'';
  position:fixed;inset:0;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);
  pointer-events:none;
}

/* ── SCREENS ── */
.screen{display:none;width:100%;height:100%;}
.screen.active{display:flex;flex-direction:column;align-items:center;}

/* ════════════════════════════════
   NICKNAME SCREEN
════════════════════════════════ */
#nick-screen{
  justify-content:center;
  gap:28px;
  padding:40px 24px;
  background:radial-gradient(ellipse at 50% 40%, #111128 0%, var(--bg) 70%);
}

.nick-logo{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(13px,3.5vw,20px);
  color:var(--green);
  text-align:center;
  line-height:2;
  text-shadow:0 0 24px rgba(0,255,136,.7),0 0 48px rgba(0,255,136,.3);
  animation:glow 2.5s ease-in-out infinite;
}
@keyframes glow{
  0%,100%{text-shadow:0 0 20px rgba(0,255,136,.6),0 0 40px rgba(0,255,136,.25);}
  50%{text-shadow:0 0 35px rgba(0,255,136,1),0 0 70px rgba(0,255,136,.5);}
}

.nick-card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:3px;
  padding:24px;
  width:100%;max-width:320px;
  display:flex;flex-direction:column;gap:14px;
}
.nick-label{
  font-size:14px;color:var(--dim);letter-spacing:3px;text-align:center;
}
.nick-warn{
  font-size:13px;color:var(--yellow);letter-spacing:1px;text-align:center;line-height:1.6;
}
input[type=text]{
  width:100%;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:2px;
  color:var(--green);
  font-family:'VT323',monospace;
  font-size:24px;
  padding:10px 14px;
  outline:none;
  letter-spacing:2px;
  transition:border-color .2s;
  -webkit-appearance:none;
}
input[type=text]:focus{border-color:var(--green);}
input[type=text]::placeholder{color:var(--dim);}

.confirm-btn{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(9px,2.2vw,12px);
  padding:14px;
  border:2px solid var(--green);
  background:transparent;
  color:var(--green);
  border-radius:2px;
  cursor:pointer;
  letter-spacing:1px;
  width:100%;max-width:320px;
  -webkit-appearance:none;
  transition:all .15s;
}
.confirm-btn:active{background:var(--green);color:var(--bg);transform:scale(.97);}

/* modal */
.modal-backdrop{
  display:none;
  position:fixed;inset:0;z-index:200;
  background:rgba(7,7,14,.9);
  align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
}
.modal-backdrop.open{display:flex;}
.modal-box{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:3px;
  padding:28px 24px;
  width:min(300px,86vw);
  display:flex;flex-direction:column;align-items:center;gap:18px;
  text-align:center;
}
.modal-title{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(10px,2.5vw,13px);
  color:var(--yellow);
  line-height:1.8;
}
.modal-body{font-size:20px;color:var(--text);line-height:1.6;letter-spacing:1px;}
.modal-btns{display:flex;gap:10px;width:100%;}
.modal-btn{
  flex:1;
  font-family:'Press Start 2P',monospace;
  font-size:9px;padding:12px 6px;
  border:1px solid var(--border);
  background:var(--panel);color:var(--text);
  border-radius:2px;cursor:pointer;
  -webkit-appearance:none;transition:all .15s;
}
.modal-btn.yes{border-color:var(--green);color:var(--green);}
.modal-btn.no {border-color:var(--red);  color:var(--red);}
.modal-btn:active{opacity:.7;transform:scale(.97);}

/* ════════════════════════════════
   HOME SCREEN
════════════════════════════════ */
#home-screen{
  justify-content:flex-start;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,255,136,.06) 0%, transparent 70%),
    var(--bg);
}

/* top bar */
.topbar{
  width:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:max(14px,env(safe-area-inset-top)) 18px 10px;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.topbar-logo{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(9px,2vw,12px);
  color:var(--green);
  letter-spacing:1px;
}
.topbar-player{
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;
}
.topbar-label{font-size:12px;color:var(--dim);letter-spacing:2px;}
.topbar-nick{font-size:20px;color:var(--text);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* hub layout */
.hub{
  flex:1;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:12px 16px max(16px,env(safe-area-inset-bottom));
  gap:10px;
  min-height:0;
}

/* center snake button */
.center-btn{
  position:relative;
  width:min(180px,42vw);
  aspect-ratio:1/1;
  background:var(--panel);
  border:2px solid var(--green);
  border-radius:6px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:6px;
  cursor:pointer;
  overflow:hidden;
  box-shadow:0 0 30px rgba(0,255,136,.15),inset 0 0 20px rgba(0,255,136,.05);
  transition:all .15s;
  flex-shrink:0;
}
.center-btn::before{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(0,255,136,.03) 8px,rgba(0,255,136,.03) 9px);
}
.center-btn:active{transform:scale(.95);box-shadow:0 0 50px rgba(0,255,136,.4);}
.center-icon{font-size:clamp(32px,8vw,44px);line-height:1;position:relative;z-index:1;}
.center-label{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(8px,1.8vw,11px);
  color:var(--green);
  letter-spacing:2px;
  position:relative;z-index:1;
}
.center-sub{font-size:14px;color:var(--green2);letter-spacing:1px;position:relative;z-index:1;}
#flame-canvas{position:absolute;bottom:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* 6-grid around center */
.side-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  width:100%;max-width:360px;
}

.side-btn{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:4px;
  padding:14px 8px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:6px;
  cursor:pointer;
  transition:all .15s;
  position:relative;
  overflow:hidden;
  min-height:100px;
}
.side-btn::after{
  content:'';
  position:absolute;inset:0;
  opacity:0;
  transition:opacity .2s;
}
.side-btn:active{transform:scale(.95);}
.side-btn:active::after{opacity:1;}

/* color variants */
.btn-yellow{border-color:rgba(255,204,0,.4);}
.btn-yellow .side-icon{color:var(--yellow);}
.btn-yellow .side-label{color:var(--yellow);}
.btn-yellow::after{background:rgba(255,204,0,.08);}

.btn-blue{border-color:rgba(68,170,255,.4);}
.btn-blue .side-icon{color:var(--blue);}
.btn-blue .side-label{color:var(--blue);}
.btn-blue::after{background:rgba(68,170,255,.08);}

.btn-purple{border-color:rgba(187,102,255,.4);}
.btn-purple .side-icon{color:var(--purple);}
.btn-purple .side-label{color:var(--purple);}
.btn-purple::after{background:rgba(187,102,255,.08);}

.btn-orange{border-color:rgba(255,136,51,.4);}
.btn-orange .side-icon{color:var(--orange);}
.btn-orange .side-label{color:var(--orange);}
.btn-orange::after{background:rgba(255,136,51,.08);}

.btn-cyan{border-color:rgba(0,238,255,.4);}
.btn-cyan .side-icon{color:var(--cyan);}
.btn-cyan .side-label{color:var(--cyan);}
.btn-cyan::after{background:rgba(0,238,255,.08);}

.btn-red{border-color:rgba(255,68,85,.4);}
.btn-red .side-icon{color:var(--red);}
.btn-red .side-label{color:var(--red);}
.btn-red::after{background:rgba(255,68,85,.08);}
.btn-dim{border-color:var(--border);border-style:dashed;cursor:default;}
.btn-dim:active{transform:none;}

.side-icon{font-size:clamp(22px,5.5vw,30px);line-height:1;}
.side-label{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(6px,1.4vw,8px);
  letter-spacing:1px;
  text-align:center;
  line-height:1.5;
}
.side-badge{
  position:absolute;top:6px;right:8px;
  font-size:11px;color:var(--dim);
  letter-spacing:1px;
}

/* coming soon overlay on side btn */
.soon-tag{
  position:absolute;bottom:5px;
  font-size:10px;color:var(--dim);letter-spacing:1px;
}

/* ── SNAKE SCREEN  (carry-over) ── */
#game-screen{
  justify-content:flex-start;
  background:var(--bg);
}
.hud{
  width:100%;
  display:flex;justify-content:space-between;align-items:center;
  padding:max(10px,env(safe-area-inset-top)) 16px 6px;
  flex-shrink:0;
  font-size:18px;letter-spacing:2px;
}
.hud-item{display:flex;flex-direction:column;gap:2px;}
.hud-label{font-size:12px;color:var(--dim);}
.hud-value{color:var(--green);font-size:20px;}
.hud-value.best{color:var(--yellow);}
.hud-nick{color:var(--text);font-size:16px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.back-btn{
  font-family:'Press Start 2P',monospace;
  font-size:8px;padding:8px 10px;
  border:1px solid var(--border);background:transparent;color:var(--dim);
  border-radius:2px;cursor:pointer;-webkit-appearance:none;
}
.back-btn:active{color:var(--text);border-color:var(--text);}

.diff-bar{
  display:flex;gap:8px;padding:4px 16px 2px;flex-shrink:0;
}
.diff-btn{
  font-family:'Press Start 2P',monospace;
  font-size:7px;letter-spacing:1px;
  padding:7px 10px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--dim);
  border-radius:2px;
  cursor:pointer;
  display:flex;align-items:center;gap:6px;
  transition:all .15s;
  flex:1;justify-content:center;
  -webkit-appearance:none;
}
.diff-btn.active{color:var(--text);border-color:currentColor;}
.diff-btn[data-diff="easy"].active{color:#44aaff;border-color:#44aaff;}
.diff-btn[data-diff="normal"].active{color:#00ff88;border-color:#00ff88;}
.diff-btn[data-diff="hard"].active{color:#ff4455;border-color:#ff4455;}
.diff-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;min-height:0;}
canvas{display:block;border:1px solid var(--border);image-rendering:pixelated;background:#12121a;}

.dpad-area{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 10px max(10px,env(safe-area-inset-bottom));}
.dpad{display:grid;grid-template-areas:'. up .' 'left . right' '. down .';grid-template-columns:60px 60px 60px;grid-template-rows:52px 52px 52px;gap:4px;}
.dpad-btn{display:flex;align-items:center;justify-content:center;background:var(--panel);border:1px solid var(--border);border-radius:4px;cursor:pointer;touch-action:manipulation;}
.dpad-btn:active{background:var(--green);border-color:var(--green);}
.dpad-btn svg{fill:var(--dim);transition:fill .1s;}
.dpad-btn:active svg{fill:var(--bg);}
[data-dir=up]{grid-area:up;}[data-dir=left]{grid-area:left;}[data-dir=right]{grid-area:right;}[data-dir=down]{grid-area:down;}

.overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(7,7,14,.88);flex-direction:column;align-items:center;justify-content:center;gap:20px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.overlay.visible{display:flex;}
.ov-title{font-family:'Press Start 2P',monospace;font-size:clamp(14px,3.5vw,20px);text-align:center;line-height:1.8;}
.ov-title.green{color:var(--green);}
.ov-title.red{color:var(--red);}
.ov-title.yellow{color:var(--yellow);}
.ov-score{font-size:26px;color:var(--text);letter-spacing:3px;}
.ov-record{font-size:18px;color:var(--yellow);letter-spacing:2px;}
.ov-btns{display:flex;flex-direction:column;gap:10px;width:240px;}
.ov-btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:12px;border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:2px;cursor:pointer;-webkit-appearance:none;transition:all .15s;}
.ov-btn.primary{border-color:var(--green);color:var(--green);}
.ov-btn:active{opacity:.7;transform:scale(.97);}
.saving{font-size:15px;color:var(--dim);letter-spacing:2px;min-height:18px;}
</style>
</head>
<body>

<!-- ════════════════════════════════
     NICKNAME MODAL (首次启动)
════════════════════════════════ -->
<div class="modal-backdrop" id="nick-modal">
  <div class="modal-box" style="gap:16px;max-width:300px;">
    <div class="modal-title" style="color:var(--green)">ARCADE HUB<br><span style="color:var(--dim);font-size:.7em">SET YOUR NAME</span></div>
    <div class="nick-warn" style="font-size:13px;color:var(--yellow);letter-spacing:1px;text-align:center;line-height:1.6;">⚠ 昵称只能设置一次<br>设备永久绑定，无法修改</div>
    <input type="text" id="nick-input" placeholder="输入昵称..." maxlength="12"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="confirm-btn" id="confirm-nick-btn" style="max-width:100%;">✔ CONFIRM</button>
  </div>
</div>

<!-- 二次确认 modal -->
<div class="modal-backdrop" id="confirm-modal">
  <div class="modal-box">
    <div class="modal-title">确认昵称？</div>
    <div class="modal-body" id="modal-nick-display"></div>
    <div class="modal-body" style="font-size:15px;color:var(--dim)">昵称<span style="color:var(--red)">永久绑定</span>此设备<br>无法修改</div>
    <div class="modal-btns">
      <button class="modal-btn yes" id="modal-yes">✔ 确认</button>
      <button class="modal-btn no"  id="modal-no">✘ 重填</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════
     HOME SCREEN
════════════════════════════════ -->
<div id="home-screen" class="screen active">

  <div class="topbar">
    <div class="topbar-logo">ARCADE HUB</div>
    <div class="topbar-player">
      <div class="topbar-label">PLAYER</div>
      <div class="topbar-nick" id="topbar-nick">—</div>
    </div>
  </div>

  <div class="hub">

    <!-- 中央 SNAKE 大按钮 -->
    <div class="center-btn" id="snake-entry">
      <canvas id="flame-canvas"></canvas>
      <div class="center-icon">🐍</div>
      <div class="center-label">SNAKE</div>
      <div class="center-sub">CLASSIC</div>
    </div>

    <!-- 6 个功能按钮 -->
    <div class="side-grid">

      <div class="side-btn btn-yellow" data-fn="leaderboard">
        <div class="side-icon">🏆</div>
        <div class="side-label">LEADER<br>BOARD</div>
        <div class="soon-tag">SOON</div>
      </div>

      <div class="side-btn btn-blue" data-fn="daily">
        <div class="side-icon">📅</div>
        <div class="side-label">DAILY<br>QUEST</div>
        <div class="soon-tag">SOON</div>
      </div>

      <div class="side-btn btn-dim" data-fn="">
        <div class="side-icon" style="opacity:.3">▪▪▪</div>
        <div class="side-label" style="color:var(--dim)">COMING<br>SOON</div>
      </div>

      <div class="side-btn btn-dim" data-fn="">
        <div class="side-icon" style="opacity:.3">▪▪▪</div>
        <div class="side-label" style="color:var(--dim)">COMING<br>SOON</div>
      </div>

    </div>
  </div>
</div>

<!-- ════════════════════════════════
     GAME SCREEN
════════════════════════════════ -->
<div id="game-screen" class="screen">
  <div class="hud">
    <button class="back-btn" id="back-btn">◀ BACK</button>
    <div class="hud-item" style="text-align:center">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="hud-score">0</div>
    </div>
    <div class="hud-item" style="text-align:right">
      <div class="hud-label">BEST</div>
      <div class="hud-value best" id="hud-best">—</div>
    </div>
  </div>

  <div class="diff-bar">
    <div class="diff-btn active" data-diff="easy">
      <span class="diff-dot" style="background:#44aaff"></span>EASY
    </div>
    <div class="diff-btn" data-diff="normal">
      <span class="diff-dot" style="background:#00ff88"></span>NORMAL
    </div>
    <div class="diff-btn" data-diff="hard">
      <span class="diff-dot" style="background:#ff4455"></span>HARD
    </div>
  </div>
  <div class="canvas-wrap">
    <canvas id="game-canvas"></canvas>
  </div>

  <div class="dpad-area">
    <div class="dpad">
      <div class="dpad-btn" data-dir="up">
        <svg width="22" height="22" viewBox="0 0 24 24"><polygon points="12,4 20,18 4,18"/></svg>
      </div>
      <div class="dpad-btn" data-dir="left">
        <svg width="22" height="22" viewBox="0 0 24 24"><polygon points="4,12 18,4 18,20"/></svg>
      </div>
      <div class="dpad-btn" data-dir="right">
        <svg width="22" height="22" viewBox="0 0 24 24"><polygon points="20,12 6,4 6,20"/></svg>
      </div>
      <div class="dpad-btn" data-dir="down">
        <svg width="22" height="22" viewBox="0 0 24 24"><polygon points="12,20 4,6 20,6"/></svg>
      </div>
    </div>
  </div>
</div>

<!-- Game Over Overlay -->
<div class="overlay" id="gameover-overlay">
  <div class="ov-title red" id="ov-title">GAME OVER</div>
  <div class="ov-score"  id="ov-score"></div>
  <div class="ov-record" id="ov-record"></div>
  <div class="saving"    id="ov-saving"></div>
  <div class="ov-btns">
    <button class="ov-btn primary" id="retry-btn">▶ PLAY AGAIN</button>
    <button class="ov-btn"         id="home-btn2">⌂ HOME</button>
  </div>
</div>

<script>
// ═══════════════════════════════════
//  SUPABASE REST
// ═══════════════════════════════════
const SB_URL = 'https://qfplpzosjcvvyhcotodz.supabase.co';
const SB_KEY = 'sb_publishable_CxJNsIAs4JRcaPugv2fn1Q_TAKzFmQB';
const SB_H   = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
};
async function sbGet(id) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${encodeURIComponent(id)}&select=id,nickname,highScore`, { headers: SB_H });
    if (!r.ok) return null;
    const d = await r.json();
    return d && d.length ? d[0] : null;
  } catch { return null; }
}
async function sbUpsert(id, nickname, highScore) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/profiles`, {
      method: 'POST',
      headers: { ...SB_H, 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify({ id, nickname, highScore })
    });
    return r.ok;
  } catch { return false; }
}

// ═══════════════════════════════════
//  NICKNAME LOGIC
// ═══════════════════════════════════
const LS_KEY = 'arcadeNick';
let playerNick = localStorage.getItem(LS_KEY) || '';

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

if (playerNick) {

// ═══════════════════════════════════
//  SNAKE ENGINE
// ═══════════════════════════════════
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');
const CELL   = 20;

let COLS, ROWS, snake, dir, nextDir, food, score, gameOver, animId, speed, lastTime = 0, waiting = true;
let cloudBest = 0, localBest = 0;
let difficulty = 'easy';

const DIFF = {
  easy:   { initSpeed: 250, minSpeed: 120, acc: 4, headColor: '#44aaff', bodyRGB: [68,170,255]  },
  normal: { initSpeed: 160, minSpeed: 80,  acc: 3, headColor: '#00ff88', bodyRGB: [0,204,102]   },
  hard:   { initSpeed: 100, minSpeed: 50,  acc: 2, headColor: '#ff4455', bodyRGB: [255,68,85]   },
};

async function initCloudBest() {
  const p = await sbGet(playerNick);
  if (p) { cloudBest = p.highScore || 0; localBest = cloudBest; }
  document.getElementById('hud-best').textContent = cloudBest || '—';
}

function initCanvas() {
  const wrap = canvas.parentElement;
  const wW = wrap.clientWidth  - 12;
  const wH = wrap.clientHeight - 12;
  COLS = Math.max(10, Math.floor(wW / CELL));
  ROWS = Math.max(10, Math.floor(wH / CELL));
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;
}

function startNewGame() {
  initCanvas();
  initCloudBest();
  score = 0; speed = DIFF[difficulty].initSpeed; gameOver = false; lastTime = 0; waiting = true;
  const mx = Math.floor(COLS / 2), my = Math.floor(ROWS / 2);
  snake   = [{ x: mx, y: my }, { x: mx-1, y: my }, { x: mx-2, y: my }];
  dir     = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  spawnFood();
  updateHUD();
  cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function loop(ts = 0) {
  if (gameOver) return;
  animId = requestAnimationFrame(loop);
  if (waiting) { draw(); return; }
  if (ts - lastTime < speed) return;
  lastTime = ts;
  update();
  draw();
}

function update() {
  dir = { ...nextDir };
  const h = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (h.x < 0 || h.x >= COLS || h.y < 0 || h.y >= ROWS || snake.some(s => s.x === h.x && s.y === h.y)) {
    endGame(); return;
  }
  snake.unshift(h);
  if (h.x === food.x && h.y === food.y) {
    score++;
    speed = Math.max(DIFF[difficulty].minSpeed, DIFF[difficulty].initSpeed - score * DIFF[difficulty].acc);
    spawnFood();
    updateHUD();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.fillStyle = '#12121a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // grid dots
  ctx.fillStyle = '#1a1a28';
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      ctx.beginPath();
      ctx.arc(x * CELL + CELL/2, y * CELL + CELL/2, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // food
  ctx.save();
  ctx.shadowColor = '#ff4455'; ctx.shadowBlur = 14;
  ctx.fillStyle = '#ff4455';
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2 - 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // snake
  const dc = DIFF[difficulty];
  snake.forEach((seg, i) => {
    const x = seg.x * CELL + 1, y = seg.y * CELL + 1, s = CELL - 2;
    const r = i === 0 ? 6 : i === snake.length - 1 ? 2 : 4;
    if (i === 0) {
      ctx.save();
      ctx.shadowColor = dc.headColor; ctx.shadowBlur = 10;
      ctx.fillStyle = dc.headColor;
    } else {
      const t = i / snake.length;
      const [br, bg, bb] = dc.bodyRGB;
      ctx.fillStyle = `rgba(${Math.round(br*(1-t*0.4))},${Math.round(bg*(1-t*0.5))},${Math.round(bb*(1-t*0.4))},${1-t*0.3})`;
    }
    rrect(ctx, x, y, s, s, r);
    ctx.fill();
    if (i === 0) {
      ctx.restore();
      ctx.fillStyle = '#07070e';
      const px = dir.y, py = -dir.x;
      ctx.beginPath(); ctx.arc(x+s/2+dir.x*2+px*3, y+s/2+dir.y*2+py*3, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+s/2+dir.x*2-px*3, y+s/2+dir.y*2-py*3, 2, 0, Math.PI*2); ctx.fill();
    }
  });
}

function rrect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y); c.lineTo(x+w-r, y); c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r); c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h); c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r); c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}

function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-best').textContent  = Math.max(localBest, cloudBest) || '—';
}

async function endGame() {
  gameOver = true;
  cancelAnimationFrame(animId);
  const best  = Math.max(localBest, cloudBest);
  const isNew = score > best;
  const ovTitle  = document.getElementById('ov-title');
  const ovRecord = document.getElementById('ov-record');
  const ovSaving = document.getElementById('ov-saving');
  document.getElementById('ov-score').textContent = 'SCORE: ' + score;
  if (isNew) {
    ovTitle.className = 'ov-title yellow'; ovTitle.textContent = '✦ NEW RECORD ✦';
    ovRecord.textContent = 'BEST: ' + score; ovSaving.textContent = '☁ 同步云端...';
    localBest = score;
    const ok = await sbUpsert(playerNick, playerNick, score);
    ovSaving.textContent = ok ? '✓ 已同步' : '✗ 离线，未同步';
    cloudBest = score; updateHUD();
  } else {
    ovTitle.className = 'ov-title red'; ovTitle.textContent = 'GAME OVER';
    ovRecord.textContent = best > 0 ? 'BEST: ' + best : '';
    ovSaving.textContent = '';
  }
  document.getElementById('gameover-overlay').classList.add('visible');
}

  document.getElementById('gameover-overlay').classList.remove('visible');

// D-Pad
document.querySelectorAll('.dpad-btn').forEach(btn => {
  const handler = e => {
    e.preventDefault();
    const d = btn.dataset.dir;
    if (d === 'up'    && dir.y === 0) { nextDir = { x: 0, y: -1 }; waiting = false; lastTime = 0; }
    if (d === 'down'  && dir.y === 0) { nextDir = { x: 0, y:  1 }; waiting = false; lastTime = 0; }
    if (d === 'left'  && dir.x === 0) { nextDir = { x:-1, y:  0 }; waiting = false; lastTime = 0; }
    if (d === 'right' && dir.x === 0) { nextDir = { x: 1, y:  0 }; waiting = false; lastTime = 0; }
  };
  btn.addEventListener('touchstart', handler, { passive: false });
  btn.addEventListener('mousedown',  handler);
});

// Keyboard
document.addEventListener('keydown', e => {
  if (!dir) return;
  if (e.key === 'ArrowUp'    && dir.y === 0) { nextDir = { x: 0, y: -1 }; waiting = false; lastTime = 0; }
  if (e.key === 'ArrowDown'  && dir.y === 0) { nextDir = { x: 0, y:  1 }; waiting = false; lastTime = 0; }
  if (e.key === 'ArrowLeft'  && dir.x === 0) { nextDir = { x:-1, y:  0 }; waiting = false; lastTime = 0; }
  if (e.key === 'ArrowRight' && dir.x === 0) { nextDir = { x: 1, y:  0 }; waiting = false; lastTime = 0; }
});

// Swipe
let tx = 0, ty = 0;
canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx >  20 && dir.x === 0) { nextDir = { x: 1, y: 0 };  waiting = false; lastTime = 0; }
    if (dx < -20 && dir.x === 0) { nextDir = { x:-1, y: 0 };  waiting = false; lastTime = 0; }
  } else {
    if (dy >  20 && dir.y === 0) { nextDir = { x: 0, y:  1 }; waiting = false; lastTime = 0; }
    if (dy < -20 && dir.y === 0) { nextDir = { x: 0, y: -1 }; waiting = false; lastTime = 0; }
  }
}, { passive: true });

window.addEventListener('resize', () => {
  if (document.getElementById('game-screen').classList.contains('active') && !gameOver) initCanvas();
});

// ═══════════════════════════════════
//  FLAME EFFECT
// ═══════════════════════════════════
(function () {
  const fc   = document.getElementById('flame-canvas');
  const fctx = fc.getContext('2d');
  let fw = 0, fh = 0, particles = [];

  function resizeFlame() {
    const btn = document.getElementById('snake-entry');
    const w = btn.offsetWidth, h = btn.offsetHeight;
    if (!w || !h) return false;
    fw = fc.width  = w;
    fh = fc.height = h;
    return true;
  }

  function Particle() { this.reset(); }
  Particle.prototype.reset = function () {
    this.x       = (fw || 100) * 0.5 + (Math.random() - 0.5) * (fw || 100) * 0.55;
    this.y       = (fh || 100) * (0.85 + Math.random() * 0.15);
    this.vx      = (Math.random() - 0.5) * 0.9;
    this.vy      = -(1.8 + Math.random() * 2.8);
    this.life    = 0;
    this.maxLife = 45 + Math.random() * 45;
    this.size    = 3 + Math.random() * 6;
  };
  Particle.prototype.update = function () {
    this.x += this.vx + Math.sin(this.life * 0.18) * 0.4;
    this.y += this.vy;
    this.vy *= 0.995;
    this.life++;
    if (this.life >= this.maxLife) this.reset();
  };
  Particle.prototype.draw = function () {
    const t     = this.life / this.maxLife;
    const alpha = t < 0.2 ? t / 0.2 : 1 - (t - 0.2) / 0.8;
    const size  = Math.max(0.1, this.size * (1 - t * 0.5));
    if (!isFinite(this.x) || !isFinite(this.y) || !isFinite(size)) return;
    let r, g, b;
    if      (t < 0.15) { r=255; g=255; b=220; }
    else if (t < 0.35) { r=255; g=200; b=50;  }
    else if (t < 0.6)  { r=255; g=110; b=20;  }
    else               { r=200; g=40;  b=10;  }
    fctx.save();
    fctx.globalAlpha = alpha * 0.85;
    const grad = fctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, size);
    grad.addColorStop(0, `rgba(${r},${g},${b},1)`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    fctx.fillStyle = grad;
    fctx.beginPath();
    fctx.arc(this.x, this.y, size, 0, Math.PI * 2);
    fctx.fill();
    fctx.restore();
  };

  for (let i = 0; i < 55; i++) {
    const p = new Particle();
    p.life = Math.floor(Math.random() * p.maxLife);
    particles.push(p);
  }

  let flameRAF = null;
  function flameLoop() {
    if (!resizeFlame()) { flameRAF = requestAnimationFrame(flameLoop); return; }
    fctx.clearRect(0, 0, fw, fh);
    const grd = fctx.createLinearGradient(0, fh, 0, 0);
    grd.addColorStop(0,   'rgba(255,80,0,0.18)');
    grd.addColorStop(0.4, 'rgba(255,160,0,0.06)');
    grd.addColorStop(1,   'rgba(255,200,0,0)');
    fctx.fillStyle = grd;
    fctx.fillRect(0, 0, fw, fh);
    particles.forEach(p => { p.update(); p.draw(); });
    flameRAF = requestAnimationFrame(flameLoop);
  }

  const observer = new MutationObserver(() => {
    const homeActive = document.getElementById('home-screen').classList.contains('active');
    if (homeActive && !flameRAF) { resizeFlame(); flameLoop(); }
    else if (!homeActive)        { cancelAnimationFrame(flameRAF); flameRAF = null; }
  });
  observer.observe(document.getElementById('home-screen'), { attributes: true, attributeFilter: ['class'] });

  if (document.getElementById('home-screen').classList.contains('active')) {
    resizeFlame(); flameLoop();
  }
})();
</script>
