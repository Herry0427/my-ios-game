<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snake 视觉样板 · 圆润蛇节 + 大眼头部</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #1a2840 0%, #0d1218 45%, #080a0e 100%);
      color: #c8d8e8;
      font-family: system-ui, sans-serif;
      padding: 24px 16px 48px;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
      margin: 0 0 8px;
      color: #a8d0f0;
    }
    p {
      text-align: center;
      font-size: 0.82rem;
      opacity: 0.75;
      margin: 0 0 20px;
      line-height: 1.5;
    }
    .stage-wrap {
      max-width: 900px;
      margin: 0 auto;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }
    #view {
      display: block;
      width: 100%;
      height: auto;
      background: linear-gradient(180deg, #0e141c 0%, #0a0e14 100%);
    }
  </style>
</head>
<body>
  <h1>蛇身视觉样板（工业级休闲向）</h1>
  <p>圆节重叠 · 径向渐变/阴影立体 · 可转向双眼 · 三皮肤横排</p>
  <div class="stage-wrap">
    <canvas id="view" width="900" height="360"></canvas>
  </div>

  <script>
(function () {
  'use strict';

  var canvas = document.getElementById('view');
  var ctx = canvas.getContext('2d');
  var W = canvas.width;
  var H = canvas.height;

  /** 节半径 R；圆心距 < 2R 产生重叠，像连贯球体 */
  var R = 22;
  var step = 36;

  /** 单节：径向渐变 + 轻阴影，画圆（非方块） */
  function drawSegmentCircle(cx, cy, r, fillStyle, strokeStyle, lineWidth, globalAlpha) {
    ctx.save();
    if (globalAlpha != null) ctx.globalAlpha = globalAlpha;
    ctx.shadowColor = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 3;
    var g = ctx.createRadialGradient(
      cx - r * 0.35, cy - r * 0.35, 0,
      cx, cy, r
    );
    if (typeof fillStyle === 'string') {
      g.addColorStop(0, fillStyle);
      g.addColorStop(0.55, fillStyle);
      g.addColorStop(1, shadeColor(fillStyle, -0.25));
    } else {
      fillStyle(g);
    }
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    if (strokeStyle) {
      ctx.strokeStyle = strokeStyle;
      ctx.lineWidth = lineWidth || 1.5;
      ctx.stroke();
    }
    ctx.restore();
  }

  function shadeColor(hex, amount) {
    // 简单变暗：仅支持 #rrggbb
    var m = hex.match(/^#?([\da-f]{6})$/i);
    if (!m) return hex;
    var n = parseInt(m[1], 16);
    var r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    r = Math.max(0, Math.min(255, r * (1 + amount)));
    g = Math.max(0, Math.min(255, g * (1 + amount)));
    b = Math.max(0, Math.min(255, b * (1 + amount)));
    return 'rgb(' + (r|0) + ',' + (g|0) + ',' + (b|0) + ')';
  }

  /** 淡黄色五角星（中国皮肤节心） */
  function drawStar(cx, cy, outer, inner, fill) {
    ctx.save();
    ctx.beginPath();
    var i, a, x, y;
    for (i = 0; i < 10; i++) {
      a = (Math.PI / 2) + (i * Math.PI) / 5;
      var rad = i % 2 === 0 ? outer : inner;
      x = cx + Math.cos(a) * rad;
      y = cy - Math.sin(a) * rad;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.restore();
  }

  /**
   * 蛇头眼睛：大白圈 + 黑瞳；瞳孔略朝运动方向偏，形成“在看”
   * dir: 单位向量 (dx,dy)，与蛇身水平段方向一致
   */
  function drawEyes(hx, hy, R, dirX, dirY) {
    var len = Math.hypot(dirX, dirY) || 1;
    var fx = dirX / len;
    var fy = dirY / len;
    var sx = -fy;
    var sy = fx;
    var forward = 0.32 * R;
    var eyeR = 0.28 * R;
    var spread = 0.26 * R;
    var lx = hx + fx * forward + sx * spread;
    var ly = hy + fy * forward + sy * spread;
    var rx = hx + fx * forward - sx * spread;
    var ry = hy + fy * forward - sy * spread;
    var pupilOff = 0.14 * R;

    function oneEye(ex, ey) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(ex, ey, eyeR, 0, Math.PI * 2);
      ctx.fillStyle = '#f8f8f8';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(ex + fx * pupilOff, ey + fy * pupilOff, eyeR * 0.38, 0, Math.PI * 2);
      ctx.fillStyle = '#1a1a1a';
      ctx.fill();
      ctx.restore();
    }
    oneEye(lx, ly);
    oneEye(rx, ry);
  }

  /** 从左到右一串圆心；最后一节为头，画眼睛 */
  function drawSnakeLine(y0, x0, nSeg, skin, label) {
    var i, cx, cy;
    var centers = [];
    for (i = 0; i < nSeg; i++) {
      centers.push({ x: x0 + i * step, y: y0 });
    }
    var head = centers[centers.length - 1];
    var tail = centers[0];
    var dirX = head.x - tail.x;
    var dirY = head.y - tail.y;
    var d = Math.hypot(dirX, dirY) || 1;
    dirX /= d;
    dirY /= d;

    ctx.save();
    ctx.font = '600 13px system-ui,sans-serif';
    ctx.fillStyle = 'rgba(200,215,230,0.85)';
    ctx.textAlign = 'left';
    ctx.fillText(label, x0 - 8, y0 - R - 18);

    for (i = 0; i < centers.length - 1; i++) {
      cx = centers[i].x;
      cy = centers[i].y;
      if (skin === 'china') {
        drawSegmentCircle(cx, cy, R, '#d62828', '#8b0000', 1.2, 1);
        drawStar(cx, cy, 7, 3, '#fff3a0');
      } else if (skin === 'bee') {
        var stripe = i % 2 === 0;
        drawSegmentCircle(
          cx,
          cy,
          R,
          stripe ? '#ffd93d' : '#1a1a1a',
          stripe ? '#e6b800' : '#333',
          1.2,
          1
        );
      } else if (skin === 'ghost') {
        ctx.save();
        ctx.shadowColor = 'rgba(180, 140, 255, 0.75)';
        ctx.shadowBlur = 14;
        drawSegmentCircle(cx, cy, R, '#c9b8ff', 'rgba(200,180,255,0.9)', 2, 0.5);
        ctx.restore();
      }
    }

    i = centers.length - 1;
    cx = centers[i].x;
    cy = centers[i].y;
    if (skin === 'china') {
      drawSegmentCircle(cx, cy, R, '#e63939', '#9d0208', 1.2, 1);
      drawStar(cx, cy, 7, 3, '#fff3a0');
    } else if (skin === 'bee') {
      var headStripe = (nSeg - 1) % 2 === 0;
      drawSegmentCircle(
        cx,
        cy,
        R,
        headStripe ? '#ffd93d' : '#1a1a1a',
        headStripe ? '#e6b800' : '#333',
        1.2,
        1
      );
    } else if (skin === 'ghost') {
      ctx.save();
      ctx.shadowColor = 'rgba(180, 140, 255, 0.85)';
      ctx.shadowBlur = 16;
      drawSegmentCircle(cx, cy, R, '#dcd0ff', 'rgba(220,200,255,0.95)', 2, 0.5);
      ctx.restore();
    }

    drawEyes(cx, cy, R, dirX, dirY);
    ctx.restore();
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    var padX = 70;
    var y1 = 95;
    var y2 = 180;
    var y3 = 265;
    var n = 8;

    drawSnakeLine(y1, padX, n, 'china', 'A · [中国] 红金渐变 + 节心五角星');
    drawSnakeLine(y2, padX, n, 'bee', 'B · [小蜜蜂] 黄黑条纹');
    drawSnakeLine(y3, padX, n, 'ghost', 'C · [幽灵] 浅紫半透明 + 发光边');
  }

  render();
})();
  </script>
</body>
</html>
